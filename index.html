<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claro del Bosque — Taller de construcción</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --walnut:#33241a; --walnut-2:#46311f; --gold:#eab35e; --cream:#f6e8cf; --ink:#1d150e;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-user-select:none;user-select:none}
  html,body{width:100%;height:100%;overflow:hidden;background:#0c1116;font-family:'Fredoka',system-ui,sans-serif}
  #scene{position:fixed;inset:0;display:block;cursor:crosshair}
  #vignette{position:fixed;inset:0;pointer-events:none;
    background:radial-gradient(ellipse at 50% 44%, transparent 42%, rgba(2,4,6,.62) 100%);}
  #titleCard{position:fixed;top:18px;left:18px;pointer-events:none;color:var(--cream);
    text-shadow:0 2px 8px rgba(40,20,5,.45);}
  #titleCard h1{font-size:22px;font-weight:700;letter-spacing:.5px}
  #titleCard p{font-size:13px;font-weight:500;opacity:.85;margin-top:2px}
  #counter{display:inline-flex;align-items:center;gap:7px;margin-top:10px;padding:6px 14px;
    background:linear-gradient(180deg,var(--walnut-2),var(--walnut));border:1px solid rgba(234,179,94,.4);
    border-radius:99px;font-size:14px;font-weight:600;color:var(--gold);
    box-shadow:0 4px 14px rgba(30,15,5,.35), inset 0 1px 0 rgba(255,225,170,.15)}
  #counter svg{width:15px;height:15px}
  #counter.bump{animation:bump .25s ease}
  @keyframes bump{40%{transform:scale(1.12)}}
  #hints{position:fixed;top:18px;right:18px;width:218px;padding:13px 15px;border-radius:14px;
    background:linear-gradient(180deg,rgba(58,40,24,.92),rgba(40,27,16,.92));
    border:1px solid rgba(234,179,94,.35);color:var(--cream);font-size:12.5px;line-height:2;
    box-shadow:0 8px 24px rgba(25,12,4,.4);transition:opacity .5s, transform .5s;}
  #hints.hidden{opacity:0;transform:translateX(12px);pointer-events:none}
  #hints b{color:var(--gold);font-weight:600}
  #hints .row{display:flex;justify-content:space-between;align-items:center;gap:8px}
  #hints .kbd{background:rgba(234,179,94,.16);border:1px solid rgba(234,179,94,.35);border-radius:6px;
    padding:0 7px;font-size:11px;font-weight:600;color:var(--gold);white-space:nowrap;height:20px;
    display:inline-flex;align-items:center}
  #hintsClose{position:absolute;top:6px;right:9px;cursor:pointer;color:var(--gold);opacity:.7;font-size:14px}
  #lightCtl{position:fixed;top:118px;left:18px;display:flex;align-items:center;gap:10px;
    padding:9px 14px;border-radius:99px;
    background:linear-gradient(180deg,rgba(58,40,24,.92),rgba(40,27,16,.92));
    border:1px solid rgba(234,179,94,.35);color:var(--cream);
    box-shadow:0 6px 18px rgba(0,0,0,.45)}
  #lightCtl svg{width:16px;height:16px;stroke:var(--gold);fill:none;stroke-width:2;
    stroke-linecap:round;flex:none}
  #lightCtl input{-webkit-appearance:none;appearance:none;width:130px;height:5px;border-radius:99px;
    background:linear-gradient(90deg,#1a232e, var(--gold));outline:none;cursor:pointer}
  #lightCtl input::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:17px;height:17px;
    border-radius:50%;background:radial-gradient(circle at 35% 35%, #ffe6b0, var(--gold) 70%);
    border:2px solid #2a1d12;box-shadow:0 0 10px rgba(234,179,94,.7), 0 2px 5px rgba(0,0,0,.5)}
  #lightCtl input::-moz-range-thumb{width:17px;height:17px;border-radius:50%;
    background:radial-gradient(circle at 35% 35%, #ffe6b0, var(--gold) 70%);
    border:2px solid #2a1d12;box-shadow:0 0 10px rgba(234,179,94,.7)}
  #toolbar{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);display:flex;gap:8px;
    padding:10px 12px;border-radius:18px;
    background:
      linear-gradient(180deg, rgba(255,225,170,.07), rgba(0,0,0,.18)),
      repeating-linear-gradient(90deg, #3c2b1b 0 26px, #41301f 26px 52px);
    border:1.5px solid rgba(234,179,94,.45);
    box-shadow:0 10px 30px rgba(25,12,4,.5), inset 0 1px 0 rgba(255,225,170,.18);}
  .tool{position:relative;width:62px;height:66px;border-radius:13px;border:1.5px solid rgba(234,179,94,.22);
    background:linear-gradient(180deg,#4a3522,#382818);display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:3px;cursor:pointer;color:var(--cream);
    transition:transform .14s cubic-bezier(.34,1.56,.64,1), box-shadow .14s, border-color .14s;}
  .tool:hover{transform:translateY(-5px) scale(1.06);border-color:rgba(234,179,94,.6)}
  .tool.sel{border-color:var(--gold);box-shadow:0 0 0 2px rgba(234,179,94,.45), 0 6px 18px rgba(234,179,94,.3);
    background:linear-gradient(180deg,#5d4226,#46331c);transform:translateY(-6px) scale(1.08)}
  .tool svg{width:26px;height:26px;stroke:var(--cream);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
  .tool.sel svg{stroke:var(--gold)}
  .tool .lbl{font-size:10.5px;font-weight:600;letter-spacing:.3px;opacity:.9}
  .tool .key{position:absolute;top:-7px;right:-5px;width:18px;height:18px;border-radius:6px;background:var(--gold);
    color:var(--ink);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;
    box-shadow:0 2px 6px rgba(0,0,0,.4)}
  #vrBtn{position:fixed;right:18px;bottom:20px;display:none;padding:11px 20px;border-radius:99px;
    border:1.5px solid rgba(234,179,94,.6);cursor:pointer;font-family:'Fredoka',sans-serif;
    font-size:14px;font-weight:600;color:var(--ink);
    background:linear-gradient(180deg,#f3c87e,var(--gold));
    box-shadow:0 6px 20px rgba(234,179,94,.35), 0 4px 12px rgba(0,0,0,.5);
    transition:transform .15s}
  #vrBtn.show{display:block}
  #vrBtn:hover{transform:translateY(-2px) scale(1.04)}
  #toast{position:fixed;left:50%;bottom:104px;transform:translateX(-50%) translateY(8px);padding:9px 20px;
    border-radius:99px;background:rgba(40,27,16,.92);border:1px solid rgba(234,179,94,.4);color:var(--cream);
    font-size:14px;font-weight:500;opacity:0;transition:opacity .35s, transform .35s;pointer-events:none;
    box-shadow:0 6px 18px rgba(25,12,4,.4);white-space:nowrap}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  #toast b{color:var(--gold)}
  @media (max-width:680px){
    #hints{display:none}
    .tool{width:50px;height:56px}
    .tool .lbl{font-size:9px}
    #titleCard h1{font-size:18px}
  }
  @media (prefers-reduced-motion:reduce){ .tool,.tool:hover,.tool.sel{transition:none;transform:none} }
</style>
</head>
<body>
<canvas id="scene"></canvas>
<div id="vignette"></div>

<div id="titleCard">
  <h1>Claro del Bosque</h1>
  <p>Taller de construcción en madera</p>
  <span id="counter">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-6 9 6v11a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1z"/></svg>
    <span id="countNum">0</span>&nbsp;piezas
  </span>
</div>

<div id="lightCtl" title="Luz del teatro">
  <svg viewBox="0 0 24 24"><path d="M12 3a7 7 0 0 0-4 12.7V18a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1v-2.3A7 7 0 0 0 12 3z"/><path d="M10 21h4"/></svg>
  <input type="range" id="lightSlider" min="0" max="100" value="26" aria-label="Cantidad de luz">
</div>

<div id="hints">
  <span id="hintsClose">✕</span>
  <b>Cómo se juega</b><br>
  <div class="row"><span>Moverse</span><span class="kbd">W A S D</span></div>
  <div class="row"><span>Colocar pieza</span><span class="kbd">Clic izq.</span></div>
  <div class="row"><span>Girar pieza</span><span class="kbd">Rueda</span></div>
  <div class="row"><span>Quitar pieza</span><span class="kbd">Clic der.</span></div>
  <div class="row"><span>Cámara</span><span class="kbd">Arrastrar der.</span></div>
  <div class="row"><span>Zoom</span><span class="kbd">Mayús+rueda</span></div>
  <div class="row"><span>Modo paseo</span><span class="kbd">0 / Esc</span></div>
</div>

<div id="toolbar"></div>
<div id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
'use strict';
const C  = 2.0;      // tamaño de celda
const WH = 2.2;      // altura de muro / nivel
const PLATEAU_R = 16;

/* ---------- renderer / escena ---------- */
const canvas = document.getElementById('scene');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.95;

const scene = new THREE.Scene();
const FOG_COLOR = 0x0c1116;
scene.fog = new THREE.Fog(FOG_COLOR, 11, 36);
scene.background = new THREE.Color(FOG_COLOR);
const camera = new THREE.PerspectiveCamera(46, innerWidth/innerHeight, 0.1, 300);
const rig = new THREE.Group();      // en VR escala al jugador, no al mundo
rig.add(camera); scene.add(rig);

/* ---------- cielo degradado ---------- */
(function makeSky(){
  const g = new THREE.SphereGeometry(170, 24, 18);
  const pos = g.attributes.position;
  const cols = new Float32Array(pos.count*3);
  const zen = new THREE.Color(0x04070c), hor = new THREE.Color(0x18222e), low = new THREE.Color(0x05080b);
  const tmp = new THREE.Color();
  for(let i=0;i<pos.count;i++){
    const t = pos.getY(i)/170;
    if(t>=0){ tmp.copy(hor).lerp(zen, Math.pow(Math.min(t*1.4,1), .8)); }
    else    { tmp.copy(hor).lerp(low, Math.min(-t*2,1)); }
    cols[i*3]=tmp.r; cols[i*3+1]=tmp.g; cols[i*3+2]=tmp.b;
  }
  g.setAttribute('color', new THREE.BufferAttribute(cols,3));
  const m = new THREE.MeshBasicMaterial({vertexColors:true, side:THREE.BackSide, fog:false, depthWrite:false});
  const sky = new THREE.Mesh(g,m); sky.renderOrder=-10; scene.add(sky);
})();

/* ---------- rig de teatro: el diorama iluminado en la oscuridad ---------- */
const hemi = new THREE.HemisphereLight(0x34465c, 0x141a12, 0.28);
scene.add(hemi);
const amb = new THREE.AmbientLight(0x26384c, 0.09);
scene.add(amb);
// luz principal cálida y rasante (con sombras)
const sun = new THREE.DirectionalLight(0xffc488, 0.95);
sun.position.set(17, 11, 9);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left=-20; sun.shadow.camera.right=20;
sun.shadow.camera.top=20;  sun.shadow.camera.bottom=-20;
sun.shadow.camera.near=2;  sun.shadow.camera.far=60;
sun.shadow.bias=-0.0006;
sun.shadow.radius=4;
scene.add(sun);
// foco de escenario: un cono suave que baña la meseta desde arriba
const spot = new THREE.SpotLight(0xfff0d6, 0.85, 0, 0.62, 0.75, 1.6);
spot.position.set(7, 22, 5);
spot.target.position.set(0, 0, 0);
scene.add(spot); scene.add(spot.target);
// contraluz frío para recortar siluetas
const rim = new THREE.DirectionalLight(0x4f6f9e, 0.55);
rim.position.set(-12, 9, -14); scene.add(rim);
// farolillo: corazón cálido constante (no depende del slider)
const lantern = new THREE.PointLight(0xffa45e, 1.45, 13, 2);
lantern.position.set(10.6, 2.1, 7.2); scene.add(lantern);
// tenue relleno sobre la parcela para leer lo construido
const plotGlow = new THREE.PointLight(0xffdcae, 0.22, 20, 2);
plotGlow.position.set(0, 5, 0); scene.add(plotGlow);

/* ---------- estrellas tenues en la negrura ---------- */
(function stars(){
  const n=160, pos=new Float32Array(n*3);
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, e=Math.random()*0.9+0.12, r=150;
    pos[i*3]=Math.cos(a)*Math.cos(e)*r;
    pos[i*3+1]=Math.sin(e)*r;
    pos[i*3+2]=Math.sin(a)*Math.cos(e)*r;
  }
  const g=new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(pos,3));
  const m=new THREE.PointsMaterial({color:0xcfdcec, size:1.0, transparent:true, opacity:.55,
    blending:THREE.AdditiveBlending, depthWrite:false, fog:false, sizeAttenuation:true});
  scene.add(new THREE.Points(g,m));
})();

/* ---------- haces de luz entre los árboles (estilo Moss) ---------- */
let shaftMat;
(function lightShafts(){
  const cv=document.createElement('canvas'); cv.width=64; cv.height=256;
  const g2=cv.getContext('2d');
  const grad=g2.createLinearGradient(0,0,0,256);
  grad.addColorStop(0,'rgba(255,235,190,0.9)');
  grad.addColorStop(0.55,'rgba(255,228,178,0.35)');
  grad.addColorStop(1,'rgba(255,225,170,0)');
  g2.fillStyle=grad; g2.fillRect(0,0,64,256);
  const grad2=g2.createLinearGradient(0,0,64,0);
  grad2.addColorStop(0,'rgba(0,0,0,1)'); grad2.addColorStop(0.25,'rgba(0,0,0,0)');
  grad2.addColorStop(0.75,'rgba(0,0,0,0)'); grad2.addColorStop(1,'rgba(0,0,0,1)');
  g2.globalCompositeOperation='destination-out';
  g2.fillStyle=grad2; g2.fillRect(0,0,64,256);
  const tex=new THREE.CanvasTexture(cv);
  shaftMat=new THREE.MeshBasicMaterial({map:tex, transparent:true, opacity:.1,
    blending:THREE.AdditiveBlending, depthWrite:false, side:THREE.DoubleSide, fog:false});
  const az=Math.atan2(sun.position.x, sun.position.z);
  const lean=Math.atan2(Math.hypot(sun.position.x, sun.position.z), sun.position.y);
  [[-9.5,-4.8,3.2,13],[6.2,-11.5,2.6,11],[-11.8,7.4,2.2,10],[12.6,-6.8,2.0,9]].forEach(sd=>{
    const grp=new THREE.Group();
    const plane=new THREE.Mesh(new THREE.PlaneGeometry(sd[2], sd[3]), shaftMat);
    plane.rotation.x=-lean*0.55;
    grp.add(plane);
    grp.rotation.y=az;
    grp.position.set(sd[0], sd[3]*0.32, sd[1]);
    scene.add(grp);
  });
})();

/* ---------- slider: cantidad de luz del teatro ---------- */
const RIG = { hemi:hemi.intensity, amb:amb.intensity, sun:sun.intensity,
              spot:spot.intensity, rim:rim.intensity, glow:plotGlow.intensity };
function applyLight(f){            // f en [0,1]
  const k = 0.035 + f*1.75;
  hemi.intensity = RIG.hemi*k;
  amb.intensity  = RIG.amb*k;
  sun.intensity  = RIG.sun*k;
  spot.intensity = RIG.spot*k;
  rim.intensity  = RIG.rim*(0.1+f*1.35);
  plotGlow.intensity = RIG.glow*(0.3+f*1.0);
  if(shaftMat) shaftMat.opacity = 0.004 + f*0.16;
  renderer.toneMappingExposure = 0.72 + f*0.4;
}

/* =====================================================================
   util: fusionar cajas/geometrías con color por vértice
   ===================================================================== */
function mergeParts(parts){
  const P=[], N=[], Col=[], I=[]; let off=0;
  const tmp = new THREE.Color(), e = new THREE.Euler(), m = new THREE.Matrix4();
  for(const p of parts){
    const g = p.geo ? p.geo : new THREE.BoxGeometry(p.w, p.h, p.d);
    e.set(p.rx||0, p.ry||0, p.rz||0);
    m.makeRotationFromEuler(e); m.setPosition(p.x||0, p.y||0, p.z||0);
    g.applyMatrix4(m);
    const pa=g.attributes.position, na=g.attributes.normal;
    tmp.set(p.c);
    if(p.jit!==false) tmp.offsetHSL((Math.random()-.5)*0.01,(Math.random()-.5)*0.05,(Math.random()-.5)*0.05);
    for(let i=0;i<pa.count;i++){
      P.push(pa.getX(i), pa.getY(i), pa.getZ(i));
      N.push(na.getX(i), na.getY(i), na.getZ(i));
      Col.push(tmp.r, tmp.g, tmp.b);
    }
    const idx=g.index.array;
    for(let i=0;i<idx.length;i++) I.push(idx[i]+off);
    off += pa.count;
    g.dispose();
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(P,3));
  geo.setAttribute('normal',   new THREE.Float32BufferAttribute(N,3));
  geo.setAttribute('color',    new THREE.Float32BufferAttribute(Col,3));
  geo.setIndex(I);
  return geo;
}
const craftMat = new THREE.MeshStandardMaterial({vertexColors:true, roughness:.82, metalness:0});

/* desvanecimiento hacia el borde del mundo: 1 en el centro, ~0 en el perímetro */
function rimFade(r){
  const t=Math.min(1, Math.max(0, (r-9.2)/(15.9-9.2)));
  const sm=t*t*(3-2*t);
  return Math.max(0.03, 1-sm);
}
/* atenúa el atributo de color de una geometría según el radio de cada vértice */
function fadeGeometryByRadius(geo, flatXY){
  const pos=geo.attributes.position, col=geo.attributes.color;
  for(let i=0;i<pos.count;i++){
    const r = flatXY ? Math.hypot(pos.getX(i), pos.getY(i))
                     : Math.hypot(pos.getX(i), pos.getZ(i));
    const f=rimFade(r);
    col.setXYZ(i, col.getX(i)*f, col.getY(i)*f, col.getZ(i)*f);
  }
  col.needsUpdate=true;
}

/* =====================================================================
   TERRENO · meseta de diorama
   ===================================================================== */
const walkables = [];
const ground = new THREE.Group(); scene.add(ground);

// ladera que se funde en la oscuridad
{
  const g = new THREE.CylinderGeometry(PLATEAU_R, PLATEAU_R-2.4, 11, 48, 5, true);
  const pos=g.attributes.position, cols=new Float32Array(pos.count*3);
  const soil=new THREE.Color(0x6e543c), t=new THREE.Color();
  for(let i=0;i<pos.count;i++){
    const v=Math.min(1, Math.max(0,(pos.getY(i)+5.5)/11));   // 1 arriba, 0 abajo
    const f=Math.pow(v,2.6)*0.22;                            // borde ya oscuro, base negra
    t.copy(soil).multiplyScalar(f);
    cols[i*3]=t.r; cols[i*3+1]=t.g; cols[i*3+2]=t.b;
  }
  g.setAttribute('color', new THREE.BufferAttribute(cols,3));
  const side=new THREE.Mesh(g, new THREE.MeshBasicMaterial({vertexColors:true}));
  side.position.y=-5.5; ground.add(side);
}
// césped superior con variación
{
  const g = new THREE.CircleGeometry(PLATEAU_R, 56);
  const n = g.attributes.position.count;
  const cols = new Float32Array(n*3);
  const base = new THREE.Color(0x6d9a52), t=new THREE.Color();
  for(let i=0;i<n;i++){
    t.copy(base).offsetHSL((Math.random()-.5)*.02,(Math.random()-.5)*.08,(Math.random()-.5)*.05);
    cols[i*3]=t.r; cols[i*3+1]=t.g; cols[i*3+2]=t.b;
  }
  g.setAttribute('color', new THREE.BufferAttribute(cols,3));
  fadeGeometryByRadius(g, true);   // CircleGeometry vive en el plano XY
  const grass = new THREE.Mesh(g, new THREE.MeshStandardMaterial({vertexColors:true, roughness:1}));
  grass.rotation.x=-Math.PI/2; grass.receiveShadow=true; ground.add(grass);
  walkables.push(grass);
}
// parcela de construcción
{
  const plot = new THREE.Mesh(new THREE.PlaneGeometry(19.4,19.4),
    new THREE.MeshStandardMaterial({color:0x86653f, roughness:1}));
  plot.rotation.x=-Math.PI/2; plot.position.y=0.015; plot.receiveShadow=true;
  ground.add(plot); walkables.push(plot);
  const logMat=new THREE.MeshStandardMaterial({color:0x6e4d2e, roughness:.9});
  for(let i=0;i<4;i++){
    const log=new THREE.Mesh(new THREE.CylinderGeometry(.14,.14,19.8,7), logMat);
    log.rotation.z=Math.PI/2;
    if(i%2){ log.rotation.y=Math.PI/2; log.position.set(i===1?9.8:-9.8,.13,0); }
    else   { log.position.set(0,.13,i===0?9.8:-9.8); }
    log.castShadow=true; ground.add(log);
  }
}
// rejilla de construcción (visible en modo construir)
const grid = new THREE.GridHelper(18, 9, 0xd9b98a, 0xc6a071);
grid.position.y = 0.03;
grid.material.transparent = true; grid.material.opacity = 0;
scene.add(grid);

// decoración fusionada: hierba, flores, setas, camino
{
  const parts=[];
  const rnd=(a,b)=>a+Math.random()*(b-a);
  for(let i=0;i<260;i++){
    const a=Math.random()*Math.PI*2, r=rnd(10.2, PLATEAU_R-0.7);
    parts.push({geo:new THREE.ConeGeometry(rnd(.04,.08), rnd(.18,.42), 4),
      x:Math.cos(a)*r+rnd(-.2,.2), y:.12, z:Math.sin(a)*r+rnd(-.2,.2), rz:rnd(-.25,.25), c:0x86b65e});
  }
  for(let i=0;i<46;i++){
    const a=Math.random()*Math.PI*2, r=rnd(10.4, PLATEAU_R-1);
    const x=Math.cos(a)*r, z=Math.sin(a)*r;
    parts.push({geo:new THREE.CylinderGeometry(.012,.012,.26,4), x,y:.13,z, c:0x6d9a4b});
    parts.push({geo:new THREE.SphereGeometry(.06,6,5), x,y:.29,z,
      c:[0xe8788a,0xf2d06b,0xe8e2f0,0xd97f5a][i%4]});
  }
  for(let i=0;i<14;i++){

function makeSparkles(n, color, size, opacity){
  const pos=new Float32Array(n*3), seed=[];
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, r=Math.random()*14+2;
    pos[i*3]=Math.cos(a)*r; pos[i*3+1]=Math.random()*4+.4; pos[i*3+2]=Math.sin(a)*r;
    seed.push(Math.random()*10);
  }
  const g=new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(pos,3));
  const m=new THREE.PointsMaterial({color, size, transparent:true, opacity,
    blending:THREE.AdditiveBlending, depthWrite:false, sizeAttenuation:true});
  const pts=new THREE.Points(g,m); pts.userData.seed=seed; scene.add(pts);
  return pts;
}

   PIEZAS DE MADERA (geometrías fusionadas, color por vértice)
   ===================================================================== */
const PLANK = 0xb5824f, PLANK_D = 0x8a5f36, TRIM = 0x6e4d2e, ROOFC = 0x9a4f38, ROOFD = 0x83432f;

function geoFloor(){
  const parts=[];
  for(let i=0;i<5;i++){
    parts.push({w:C-0.04, h:.1, d:.355, x:0, y:.05, z:-C/2 + C/10 + i*(C/5), c:PLANK});
  }
  parts.push({w:.16,h:.16,d:C, x:-.7, y:-.07, z:0, c:TRIM});
  parts.push({w:.16,h:.16,d:C, x: .7, y:-.07, z:0, c:TRIM});
  return mergeParts(parts);
}
function geoWall(){
  const parts=[];
  parts.push({w:.16,h:WH,d:.16, x:-(C/2-.08), y:WH/2, z:0, c:TRIM});
  parts.push({w:.16,h:WH,d:.16, x: (C/2-.08), y:WH/2, z:0, c:TRIM});
  const rows=6, rh=WH/rows;
  for(let i=0;i<rows;i++){
    parts.push({w:C-.2, h:rh-.045, d:.1, x:0, y:rh/2 + i*rh, z:0, c:PLANK});
  }
  parts.push({w:C, h:.12, d:.2, x:0, y:WH-.05, z:0, c:TRIM});
  return mergeParts(parts);
}
function geoWindow(){
  const parts=[];
  parts.push({w:.16,h:WH,d:.16, x:-(C/2-.08), y:WH/2, z:0, c:TRIM});
  parts.push({w:.16,h:WH,d:.16, x: (C/2-.08), y:WH/2, z:0, c:TRIM});
  // filas inferiores y superiores completas
  const rh=WH/6;
  for(let i=0;i<2;i++) parts.push({w:C-.2,h:rh-.045,d:.1, x:0,y:rh/2+i*rh, z:0, c:PLANK});
  for(let i=4;i<6;i++) parts.push({w:C-.2,h:rh-.045,d:.1, x:0,y:rh/2+i*rh, z:0, c:PLANK});
  // columnas laterales junto al hueco
  parts.push({w:.42,h:rh*2-.04,d:.1, x:-(C/2-.32), y:rh*3, z:0, c:PLANK});
  parts.push({w:.42,h:rh*2-.04,d:.1, x: (C/2-.32), y:rh*3, z:0, c:PLANK});
  // marco de ventana
  const oy=rh*3, ow=.92, oh=rh*2;
  parts.push({w:ow,h:.09,d:.16, x:0,y:oy-oh/2+.02, z:0, c:TRIM});
  parts.push({w:ow,h:.09,d:.16, x:0,y:oy+oh/2-.02, z:0, c:TRIM});
  parts.push({w:.09,h:oh,d:.16, x:-ow/2+.03, y:oy, z:0, c:TRIM});
  parts.push({w:.09,h:oh,d:.16, x: ow/2-.03, y:oy, z:0, c:TRIM});
  parts.push({w:.05,h:oh-.1,d:.05, x:0,y:oy,z:0, c:TRIM});
  parts.push({w:ow-.1,h:.05,d:.05, x:0,y:oy,z:0, c:TRIM});
  parts.push({w:C, h:.12, d:.2, x:0, y:WH-.05, z:0, c:TRIM});
  return mergeParts(parts);
}
function geoDoor(){
  const parts=[];
  parts.push({w:.16,h:WH,d:.16, x:-(C/2-.08), y:WH/2, z:0, c:TRIM});
  parts.push({w:.16,h:WH,d:.16, x: (C/2-.08), y:WH/2, z:0, c:TRIM});
  const doorW=.92, doorH=1.78;
  // columnas laterales
  const sideW=(C-.2-doorW)/2;
  parts.push({w:sideW,h:doorH,d:.1, x:-(doorW/2+sideW/2), y:doorH/2, z:0, c:PLANK});
  parts.push({w:sideW,h:doorH,d:.1, x: (doorW/2+sideW/2), y:doorH/2, z:0, c:PLANK});
  // dintel y tablas superiores
  parts.push({w:C-.2,h:.14,d:.14, x:0,y:doorH+.07, z:0, c:TRIM});
  parts.push({w:C-.2,h:WH-doorH-.2,d:.1, x:0, y:(WH+doorH)/2+.04, z:0, c:PLANK});
  parts.push({w:C, h:.12, d:.2, x:0, y:WH-.05, z:0, c:TRIM});
  // puerta entreabierta (bisagra en x=-doorW/2)
  const open=-0.62, hx=-doorW/2;
  const cx = hx + Math.cos(open)*(doorW/2-.02);
  const cz = -Math.sin(open)*(doorW/2-.02);
  parts.push({w:doorW-.04, h:doorH-.06, d:.07, x:cx, y:doorH/2-.02, z:cz, ry:open, c:PLANK_D, jit:false});
  // pomo
  parts.push({geo:new THREE.SphereGeometry(.05,6,5),
    x:hx+Math.cos(open)*(doorW-.16), y:doorH*.48, z:-Math.sin(open)*(doorW-.16)+.06, c:0xd9b05c, jit:false});
  return mergeParts(parts);
}
function geoStairs(){
  const parts=[];
  const n=6, run=C/n, rise=WH/n;
  for(let i=0;i<n;i++){
    const z = C/2 - (i+.5)*run;
    const top = (i+1)*rise;
    parts.push({w:C-.24, h:.12, d:run+.06, x:0, y:top-.06, z, c:PLANK});
    parts.push({w:C-.3, h:rise-.06, d:.08, x:0, y:top-rise/2-.04, z:z+run/2-.03, c:PLANK_D});
  }
  const L=Math.sqrt(C*C+WH*WH)+.1, ang=Math.atan2(WH,C);
  parts.push({w:.12,h:.22,d:L, x:-(C/2-.1), y:WH/2-.08, z:0, rx:ang, c:TRIM});
  parts.push({w:.12,h:.22,d:L, x: (C/2-.1), y:WH/2-.08, z:0, rx:ang, c:TRIM});
  return mergeParts(parts);
}
function geoRoof(){
  const parts=[];
  const rise=1.0, ov=.3, half=C/2;
  const L=Math.sqrt(half*half+rise*rise)+ov;   // largo de la vertiente
  const ang=Math.PI/4, strips=4, sd=L/strips;
  for(const sgn of [1,-1]){
    for(let s=0;s<strips;s++){
      const u=(s+.5)*sd - .08;
      const y = rise - u*Math.SQRT1_2 + .03 + (s%2)*.015;
      const z = sgn*(u*Math.SQRT1_2 + .02);
      parts.push({w:C+.34, h:.09, d:sd+.08, x:0, y, z,
        rx:sgn*ang, c:(s%2)?ROOFD:ROOFC});
    }
  }
  parts.push({w:C+.4, h:.15, d:.15, x:0, y:rise+.05, z:0, c:TRIM});
  return mergeParts(parts);
}

function getPlacement(type, rot, hit){
  const def=TYPES[type], p=hit.point;
  const lv=Math.max(0, Math.min(3, Math.floor((p.y+0.15)/WH)));
  let pos, key, rotY=rot*Math.PI/2;
  if(def.kind==='cell'){
    const cx=Math.round(p.x/C), cz=Math.round(p.z/C);
    pos=new THREE.Vector3(cx*C, lv*WH, cz*C);
    if(type==='roof'){ rotY=(rot%2)*Math.PI/2; key=`R:${lv}:${cx}:${cz}`; }
    else key=`${def.prefix}:${lv}:${cx}:${cz}`;
  } else {
    const axis=rot%2;
    let x,z;
    if(axis===0){ x=Math.round(p.x/C)*C; z=(Math.round(p.z/C-0.5)+0.5)*C; }
    else        { z=Math.round(p.z/C)*C; x=(Math.round(p.x/C-0.5)+0.5)*C; }
    pos=new THREE.Vector3(x, lv*WH, z);
    key=`W:${lv}:${axis}:${x.toFixed(1)}:${z.toFixed(1)}`;
  }
  const inZone = Math.abs(pos.x)<=9.3 && Math.abs(pos.z)<=9.3;
  const valid = inZone && !pieces.has(key);
  return {pos, rotY, key, valid, type, lv};
}

function updateGhost(){
  if(!selected){ ghost.visible=false; lastPlacement=null; return; }
  if(renderer.xr.isPresenting && ctrlR){ setRayFromController(ctrlR); }
  else { ray.setFromCamera(mouseNDC, camera); }
  const targets = walkables.concat(piecesGroup.children);
  const hits = ray.intersectObjects(targets, false);
  if(!hits.length){ ghost.visible=false; lastPlacement=null; return; }
  const pl = getPlacement(selected, rotIndex, hits[0]);
  lastPlacement = pl;
  ghost.geometry = TYPES[selected].geo;
  ghost.material = pl.valid ? ghostOK : ghostBAD;
  ghost.position.copy(pl.pos);
  ghost.rotation.set(0, pl.rotY, 0);
  ghost.visible = true;
}

  if(!selected || !lastPlacement || !lastPlacement.valid) { if(lastPlacement&&!lastPlacement.valid) sfx.deny(); return; }
  const pl=lastPlacement;
  const mesh=new THREE.Mesh(TYPES[pl.type].geo, craftMat);
  mesh.castShadow=true; mesh.receiveShadow=true;
  mesh.position.copy(pl.pos); mesh.rotation.y=pl.rotY;
  mesh.userData={key:pl.key, type:pl.type};
  piecesGroup.add(mesh);

function removeWithRaycaster(){
  const hits = ray.intersectObjects(piecesGroup.children, false);
  if(!hits.length) return;
  const mesh=hits[0].object;
  pieces.delete(mesh.userData.key);
  piecesGroup.remove(mesh);
  pieceCount--; updateCounter();
  dustAt(mesh.position.x, mesh.position.y+.4, mesh.position.z);
  sfx.remove();
  vrPulse(0.4, 30);
}

/* =====================================================================
   SONIDO (martillazos de carpintero, síntesis WebAudio)
   ===================================================================== */
const sfx=(function(){
  let ctx=null, combo=0, lastT=0;
  function ac(){ if(!ctx){ try{ ctx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} }
    if(ctx && ctx.state==='suspended') ctx.resume();
    return ctx; }
  function knock(freq, dur, vol, type){
    const a=ac(); if(!a) return;
    const t=a.currentTime;
    const o=a.createOscillator(), g=a.createGain();
    o.type=type||'triangle';
    o.frequency.setValueAtTime(freq, t);
    o.frequency.exponentialRampToValueAtTime(Math.max(40,freq*.45), t+dur);
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(.001, t+dur);
    o.connect(g).connect(a.destination);
    o.start(t); o.stop(t+dur+.02);
    // golpe seco (ruido corto)
    const len=a.sampleRate*.05, buf=a.createBuffer(1,len,a.sampleRate), d=buf.getChannelData(0);
    for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,2);
    const s=a.createBufferSource(), g2=a.createGain();
    s.buffer=buf; g2.gain.value=vol*.5;
    s.connect(g2).connect(a.destination); s.start(t);
  }
  return {
    place(){ const now=performance.now();
      combo = (now-lastT<1600) ? Math.min(combo+1,8) : 0; lastT=now;
      knock(170*(1+combo*.07), .14, .5); },
    remove(){ knock(95, .2, .4, 'sine'); combo=0; },
    deny(){ knock(70, .12, .25, 'square'); },
    tick(){ knock(420, .05, .12); },
  };
})();

  const off=new THREE.Vector3(Math.sin(cam.yaw)*cp, sp, Math.cos(cam.yaw)*cp).multiplyScalar(cam.dist);

function wallBlocks(x, z, y){
  for(const mesh of pieces.values()){
    const t=mesh.userData.type;
    if(t!=='wall' && t!=='window' && t!=='door') continue;
    const lv=Math.round(mesh.position.y/WH);
    if(y < lv*WH-0.4 || y > lv*WH+1.9) continue;
    const wx=mesh.position.x, wz=mesh.position.z;
    const axis = (Math.abs(Math.abs(mesh.rotation.y)%Math.PI - Math.PI/2)<.1) ? 1 : 0;
    let along, across;
    if(axis===0){ along=Math.abs(x-wx); across=Math.abs(z-wz); }
    else        { along=Math.abs(z-wz); across=Math.abs(x-wx); }
    if(across<0.26 && along<C/2+0.05){
      if(t==='door' && along<0.4) continue;     // hueco de la puerta
      return true;
    }
  }
  return false;
}

  let dx=0,dz=0;
  if(keys.KeyW||keys.ArrowUp)dz-=1; if(keys.KeyS||keys.ArrowDown)dz+=1;
  if(keys.KeyA||keys.ArrowLeft)dx-=1; if(keys.KeyD||keys.ArrowRight)dx+=1;
  let movingInput = (dx||dz);
  let wx=0, wz=0;
  if(movingInput){
    const len=Math.hypot(dx,dz); dx/=len; dz/=len;
    const s=Math.sin(cam.yaw), c=Math.cos(cam.yaw);
    wx =  dx*c + dz*s;
    wz = -dx*s + dz*c;
  } else if(vrMoveTarget){
    const tx=vrMoveTarget.x-charState.pos.x, tz=vrMoveTarget.z-charState.pos.z;
    const d=Math.hypot(tx,tz);
    if(d<0.28){ vrMoveTarget=null; }
    else { wx=tx/d; wz=tz/d; movingInput=true; }
  }
  charState.moving=false;
  if(movingInput){
    const speed=4.4;
    const tryMove=(nx,nz)=>{
      if(Math.hypot(nx,nz) > PLATEAU_R-0.9) return false;
      if(wallBlocks(nx,nz,charState.pos.y)) return false;
      const gy=groundHeightAt(nx,nz, charState.pos.y+0.9);
      if(gy===null) return false;
      if(gy - charState.pos.y > 0.62) return false;
      charState.pos.x=nx; charState.pos.z=nz;
      return true;
    };
    const nx=charState.pos.x+wx*speed*dt, nz=charState.pos.z+wz*speed*dt;
    if(!tryMove(nx,nz)){
      if(!tryMove(nx, charState.pos.z)) tryMove(charState.pos.x, nz);
    }
    charState.moving=true;
    const wantYaw=Math.atan2(wx,wz);
    let d=wantYaw-charState.yaw;
    while(d>Math.PI)d-=Math.PI*2; while(d<-Math.PI)d+=Math.PI*2;
    charState.yaw+=d*Math.min(1, dt*11);
  }
  // altura del suelo (subir escaleras / caer)
  const gy=groundHeightAt(charState.pos.x, charState.pos.z, charState.pos.y+0.9);
  if(gy!==null){
    const k = gy>charState.pos.y ? 18 : 10;
    charState.pos.y += (gy-charState.pos.y)*Math.min(1, dt*k);
  }
  char.position.copy(charState.pos);
  char.rotation.y=charState.yaw;
}

/* ---------- ratón ---------- */
let dragBtn=-1, dragMoved=0, lastMX=0, lastMY=0;
canvas.addEventListener('mousemove', e=>{
  mouseNDC.x=(e.clientX/innerWidth)*2-1;
  mouseNDC.y=-(e.clientY/innerHeight)*2+1;
  if(dragBtn>=0){
    const dx=e.clientX-lastMX, dy=e.clientY-lastMY;
    dragMoved+=Math.abs(dx)+Math.abs(dy);
    if(dragBtn===2 || (dragBtn===0 && !selected)){
      cam.yaw   -= dx*0.0055;
      cam.pitch = Math.max(0.1, Math.min(1.25, cam.pitch + dy*0.004));
    }
    lastMX=e.clientX; lastMY=e.clientY;
  }
});
canvas.addEventListener('mousedown', e=>{
  dragBtn=e.button; dragMoved=0; lastMX=e.clientX; lastMY=e.clientY;
});
addEventListener('mouseup', e=>{
  if(e.target===canvas && dragBtn===e.button && dragMoved<6){
    if(e.button===0) placePiece();
    if(e.button===2){
      const ndc=new THREE.Vector2((e.clientX/innerWidth)*2-1, -(e.clientY/innerHeight)*2+1);
      removeAt(ndc);
    }
  }
  dragBtn=-1;
});
canvas.addEventListener('contextmenu', e=>e.preventDefault());
canvas.addEventListener('wheel', e=>{
  e.preventDefault();
  const dir=Math.sign(e.deltaY);
  if(selected && !e.shiftKey){
    rotIndex=(rotIndex+(dir>0?1:3))%4;
    sfx.tick();
    updateGhost();
  } else {
    cam.dist=Math.max(4, Math.min(17, cam.dist + dir*0.8));
  }
},{passive:false});

/* =====================================================================
   INTERFAZ
   ===================================================================== */
const ICONS = {
  floor:'<svg viewBox="0 0 24 24"><path d="M3 8h18M3 13h18M3 18h18M3 8v10M21 8v10"/></svg>',
  wall:'<svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="1"/><path d="M4 9h16M4 14h16"/></svg>',

  stairs:'<svg viewBox="0 0 24 24"><path d="M4 20h4v-4h4v-4h4V8h4"/></svg>',
  roof:'<svg viewBox="0 0 24 24"><path d="M3 14L12 5l9 9M6 12.5V19M18 12.5V19"/></svg>',
  hand:'<svg viewBox="0 0 24 24"><path d="M8 12V6.5a1.5 1.5 0 0 1 3 0V11m0-5.5a1.5 1.5 0 0 1 3 0V11m0-3.5a1.5 1.5 0 0 1 3 0V13c0 4-2.5 7-6 7s-5-2-6.5-5.2c-.7-1.5.8-2.8 2.1-1.9L8 14"/></svg>',
};
const toolbar=document.getElementById('toolbar');
const order=['floor','wall','window','door','stairs','roof'];
const btns={};
order.forEach((id,i)=>{
  const b=document.createElement('div');
  b.className='tool';
  b.innerHTML=`<span class="key">${i+1}</span>${ICONS[id]}<span class="lbl">${TYPES[id].name}</span>`;
  b.addEventListener('click', ()=>selectTool(id));
  toolbar.appendChild(b); btns[id]=b;
});
{
  const b=document.createElement('div');
  b.className='tool';
  b.innerHTML=`<span class="key">0</span>${ICONS.hand}<span class="lbl">Pasear</span>`;
  b.addEventListener('click', ()=>selectTool(null));

function selectTool(id){
  selected=id;
  for(const k in btns) btns[k].classList.remove('sel');
  btns[id||'hand'].classList.add('sel');
  if(typeof drawLabel==='function') drawLabel();
  if(!id) ghost.visible=false;
  sfx.tick();
  toast(id ? `<b>${TYPES[id].name}</b> · clic para colocar · rueda para girar`
           : 'Modo paseo · muévete con <b>WASD</b>');
}
const toastEl=document.getElementById('toast');
let toastTimer=null;
function toast(html){
  toastEl.innerHTML=html;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>toastEl.classList.remove('show'), 2600);
}
const counterEl=document.getElementById('counter');
function updateCounter(){
  document.getElementById('countNum').textContent=pieceCount;
  counterEl.classList.remove('bump'); void counterEl.offsetWidth;
  counterEl.classList.add('bump');
}
document.getElementById('hintsClose').addEventListener('click',
  ()=>document.getElementById('hints').classList.add('hidden'));

/* =====================================================================
   BUCLE PRINCIPAL
   ===================================================================== */
const clock=new THREE.Clock();
let T=0;
function easeOutBack(t){ const c=1.70158; return 1 + (c+1)*Math.pow(t-1,3) + c*Math.pow(t-1,2); }

function frame(){
  const dt=Math.min(clock.getDelta(), .05);
  T+=dt;

  moveChar(dt);
  if(renderer.xr.isPresenting) vrUpdate(dt); else applyCamera(dt);
  updateGhost();

  // animación del personaje
  const w=charState.moving?1:0;
  bodyG.position.y = Math.abs(Math.sin(T*(w?9:2)))*(w?.06:.015);
  armL.rotation.x =  Math.sin(T*9)*.7*w;
  armR.rotation.x = -Math.sin(T*9)*.7*w;
  hoodM.rotation.x = Math.sin(T*9)*.06*w;
  bodyG.rotation.x = w*0.06;

  // rejilla visible en modo construcción
  const wantOp = selected ? .3 : 0;
  grid.material.opacity += (wantOp-grid.material.opacity)*Math.min(1,dt*6);

  // pop al colocar
  for(let i=anims.length-1;i>=0;i--){
    const a=anims[i]; a.t+=dt*4.2;
    if(a.t>=1){ a.mesh.scale.set(1,1,1); anims.splice(i,1); }
    else { const s=.6+.4*easeOutBack(a.t); a.mesh.scale.set(s,s,s); }
  }
  // polvo
  for(let i=puffs.length-1;i>=0;i--){
    const p=puffs[i]; p.t+=dt;
    const arr=p.pts.geometry.attributes.position;
    for(let j=0;j<p.vel.length;j++){
      arr.setX(j, arr.getX(j)+p.vel[j][0]*dt);
      arr.setY(j, arr.getY(j)+p.vel[j][1]*dt);
      arr.setZ(j, arr.getZ(j)+p.vel[j][2]*dt);
      p.vel[j][1]-=3.5*dt;
    }
    arr.needsUpdate=true;
    p.pts.material.opacity=Math.max(0,.9-p.t*1.6);
    if(p.t>0.7){ scene.remove(p.pts); p.pts.geometry.dispose(); p.pts.material.dispose(); puffs.splice(i,1); }
  }
  // luciérnagas
  {
    const arr=fireflies.geometry.attributes.position, seed=fireflies.userData.seed;
    for(let i=0;i<seed.length;i++){
      arr.setY(i, arr.getY(i)+Math.sin(T*1.3+seed[i])*.0035);
      arr.setX(i, arr.getX(i)+Math.cos(T*.7+seed[i]*2)*.003);
    }
    arr.needsUpdate=true;
    fireflies.material.opacity=.55+Math.sin(T*2.2)*.3;
    const m2=motes.geometry.attributes.position, s2=motes.userData.seed;
    for(let i=0;i<s2.length;i++){
      m2.setY(i, m2.getY(i)+Math.sin(T*.5+s2[i])*.002);
    }
    m2.needsUpdate=true;
  }
  // farolillo parpadeante
  lantern.intensity = 1.25 + Math.sin(T*7.3)*.09 + Math.sin(T*13.1)*.06;

  renderer.render(scene, camera);
}

addEventListener('resize', ()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

/* =====================================================================
   VR · MODO MESA (WebXR — Pico 4, Quest, PCVR)
   El jugador se escala ×16: el diorama queda como un teatrillo de ~2 m
   delante de ti. Mando derecho: construir. Mando izquierdo: gnomo y órbita.
   ===================================================================== */
renderer.xr.enabled = true;
renderer.xr.setReferenceSpaceType('local-floor');
const VR_SCALE = 16;
const tmpMat = new THREE.Matrix4();
let ctrlR=null, ctrlL=null, vrMoveTarget=null;
let orbitYaw=0, orbitDist=22;
const RIG_H=-12;

function setRayFromController(c){
  tmpMat.identity().extractRotation(c.matrixWorld);
  ray.ray.origin.setFromMatrixPosition(c.matrixWorld);
  ray.ray.direction.set(0,0,-1).applyMatrix4(tmpMat).normalize();
}
function vrPulse(intensity, ms){
  try{
    const src=ctrlR&&ctrlR.userData.source, gp=src&&src.gamepad;
    const h=gp&&gp.hapticActuators&&gp.hapticActuators[0];
    if(h&&h.pulse) h.pulse(intensity, ms);
  }catch(e){}
}
function clamp01(v){ return Math.max(0, Math.min(1, v)); }

/* etiqueta flotante con la pieza actual, sobre el mando derecho */
const labelCv=document.createElement('canvas'); labelCv.width=256; labelCv.height=72;
const labelTex=new THREE.CanvasTexture(labelCv);
const label=new THREE.Sprite(new THREE.SpriteMaterial({map:labelTex, transparent:true, depthTest:false}));
label.scale.set(0.16, 0.045, 1); label.position.set(0, 0.075, -0.04);
function drawLabel(){
  const g=labelCv.getContext('2d');
  g.clearRect(0,0,256,72);
  g.fillStyle='rgba(40,27,16,.88)';
  g.beginPath();
  if(g.roundRect) g.roundRect(4,4,248,64,18); else g.rect(4,4,248,64);
  g.fill();
  g.strokeStyle='rgba(234,179,94,.6)'; g.lineWidth=3; g.stroke();
  g.fillStyle='#eab35e'; g.font='600 32px Fredoka, sans-serif';
  g.textAlign='center'; g.textBaseline='middle';
  g.fillText(selected?TYPES[selected].name:'Pasear', 128, 38);
  labelTex.needsUpdate=true;
}

/* mandos + láser */
const controllers=[];
for(let i=0;i<2;i++){
  const c=renderer.xr.getController(i);
  c.userData={fx:0, fy:0, b4:false, b5:false};
  c.addEventListener('connected', function(e){ c.userData.source=e.data; assignHands(); });
  c.addEventListener('disconnected', function(){ c.userData.source=null; assignHands(); });
  const lg=new THREE.BufferGeometry().setFromPoints(
    [new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,-1)]);
  const laser=new THREE.Line(lg, new THREE.LineBasicMaterial({color:0xeab35e, transparent:true, opacity:.55}));
  laser.scale.z=2.8; c.add(laser);
  const tip=new THREE.Mesh(new THREE.SphereGeometry(.012,8,6),
    new THREE.MeshBasicMaterial({color:0xeab35e}));
  c.add(tip);
  c.addEventListener('selectstart', function(){ if(c===ctrlR) placePiece(); });
  c.addEventListener('squeezestart', function(){
    if(c===ctrlR){ setRayFromController(c); removeWithRaycaster(); }
  });
  c.visible=false;                 // solo visibles dentro de la sesión VR
  rig.add(c);
  controllers.push(c);
}
function assignHands(){
  ctrlR=null; ctrlL=null;
  for(const c of controllers){
    const h=c.userData.source && c.userData.source.handedness;
    if(h==='right') ctrlR=c;
    else if(h==='left') ctrlL=c;
  }
  if(!ctrlR) ctrlR=controllers[0];
  if(label.parent) label.parent.remove(label);
  if(ctrlR) ctrlR.add(label);
  drawLabel();
}

function cycleTool(d){
  const i=Math.max(0, order.indexOf(selected));
  selectTool(order[(i+d+order.length)%order.length]);
}
function stepLight(d){
  const v=clamp01(lightSliderEl.value/100 + d);
  lightSliderEl.value=Math.round(v*100);
  applyLight(v);
  sfx.tick();
}

/* colocación del rig: orbitar alrededor del diorama */
function applyRigOrbit(){
  rig.position.set(Math.sin(orbitYaw)*orbitDist, RIG_H, Math.cos(orbitYaw)*orbitDist);
  rig.rotation.y=orbitYaw;
}

/* lectura de sticks y botones cada frame */
function vrUpdate(dt){
  for(const c of controllers){
    const src=c.userData.source; if(!src||!src.gamepad) continue;
    const gp=src.gamepad, ax=gp.axes||[];
    const sx=ax[2]||0, sy=ax[3]||0, ud=c.userData;
    if(c===ctrlR){
      if(sx> .6 && !(ud.fx> .6)){ rotIndex=(rotIndex+1)%4; sfx.tick(); vrPulse(.2,15); }
      if(sx<-.6 && !(ud.fx<-.6)){ rotIndex=(rotIndex+3)%4; sfx.tick(); vrPulse(.2,15); }
      if(sy<-.6 && !(ud.fy<-.6)) cycleTool(1);
      if(sy> .6 && !(ud.fy> .6)) cycleTool(-1);
      ud.fx=sx; ud.fy=sy;
    } else {
      if(Math.abs(sx)>.15) { orbitYaw -= sx*dt*1.5; applyRigOrbit(); }
      if(Math.abs(sy)>.15) { orbitDist=Math.max(13, Math.min(42, orbitDist + sy*dt*9)); applyRigOrbit(); }
      if(gp.buttons[0] && gp.buttons[0].pressed){
        setRayFromController(c);
        const hits=ray.intersectObjects(walkables.concat(piecesGroup.children), false);
        if(hits.length) vrMoveTarget=hits[0].point.clone();
      }
      const b4=!!(gp.buttons[4]&&gp.buttons[4].pressed);
      const b5=!!(gp.buttons[5]&&gp.buttons[5].pressed);
      if(b4&&!ud.b4) stepLight(-0.12);
      if(b5&&!ud.b5) stepLight( 0.12);
      ud.b4=b4; ud.b5=b5;
    }
  }
}

/* sesión: escalar al gigante / restaurar escritorio */
let fogSaved=null;
renderer.xr.addEventListener('sessionstart', function(){
  controllers.forEach(function(c){ c.visible=true; });
  rig.scale.setScalar(VR_SCALE);
  orbitYaw=0; orbitDist=22; applyRigOrbit();
  fogSaved={near:scene.fog.near, far:scene.fog.far};
  scene.fog.near=60; scene.fog.far=150;   // la niebla la pone tu salón
  vrMoveTarget=null;
  drawLabel();
});
renderer.xr.addEventListener('sessionend', function(){
  controllers.forEach(function(c){ c.visible=false; });
  rig.scale.setScalar(1); rig.position.set(0,0,0); rig.rotation.y=0;
  if(fogSaved){ scene.fog.near=fogSaved.near; scene.fog.far=fogSaved.far; }
  vrMoveTarget=null;
});

/* botón Entrar en VR (solo si el navegador lo soporta) */
const vrBtn=document.createElement('button');
vrBtn.id='vrBtn'; vrBtn.textContent='Entrar en VR 🥽';
document.body.appendChild(vrBtn);
if(navigator.xr && navigator.xr.isSessionSupported){
  navigator.xr.isSessionSupported('immersive-vr').then(function(ok){
    if(ok) vrBtn.classList.add('show');
  }).catch(function(){});
}
vrBtn.addEventListener('click', function(){
  navigator.xr.requestSession('immersive-vr', {optionalFeatures:['local-floor','bounded-floor','hand-tracking']})
    .then(function(session){ renderer.xr.setSession(session); })
    .catch(function(){ toast('No se pudo iniciar la sesión VR'); });
});

const lightSliderEl=document.getElementById('lightSlider');
const lightSlider=lightSliderEl;
lightSlider.addEventListener('input', ()=>applyLight(lightSlider.value/100));
applyLight(lightSlider.value/100);

selectTool('floor');
setTimeout(()=>toast('Bienvenido a tu claro · gira la luz del teatro a tu gusto 🕯️'), 600);
renderer.setAnimationLoop(frame);
})();
