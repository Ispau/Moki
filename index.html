<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claro del Bosque — Taller de construcción</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --walnut:#33241a; --walnut-2:#46311f; --gold:#eab35e; --cream:#f6e8cf; --ink:#1d150e;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-user-select:none;user-select:none}
  html,body{width:100%;height:100%;overflow:hidden;background:#0c1116;font-family:'Fredoka',system-ui,sans-serif}
  #scene{position:fixed;inset:0;display:block;cursor:crosshair}
  #vignette{position:fixed;inset:0;pointer-events:none;
    background:radial-gradient(ellipse at 50% 44%, transparent 42%, rgba(2,4,6,.62) 100%);}
  #titleCard{position:fixed;top:18px;left:18px;pointer-events:none;color:var(--cream);
    text-shadow:0 2px 8px rgba(40,20,5,.45);}
  #titleCard h1{font-size:22px;font-weight:700;letter-spacing:.5px}
  #titleCard p{font-size:13px;font-weight:500;opacity:.85;margin-top:2px}
  #verTag{font-size:10.5px;color:var(--gold);opacity:.95;font-weight:600;
    border:1px solid rgba(234,179,94,.45);border-radius:6px;padding:1px 6px;margin-left:5px}
  #counter{display:inline-flex;align-items:center;gap:7px;padding:6px 14px;
    background:linear-gradient(180deg,var(--walnut-2),var(--walnut));border:1px solid rgba(234,179,94,.4);
    border-radius:99px;font-size:14px;font-weight:600;color:var(--gold);
    box-shadow:0 4px 14px rgba(30,15,5,.35), inset 0 1px 0 rgba(255,225,170,.15)}
  #counter svg{width:15px;height:15px}
  #counter.bump{animation:bump .25s ease}
  @keyframes bump{40%{transform:scale(1.12)}}
  #hints{position:fixed;top:18px;right:18px;width:218px;padding:13px 15px;border-radius:14px;
    background:linear-gradient(180deg,rgba(58,40,24,.92),rgba(40,27,16,.92));
    border:1px solid rgba(234,179,94,.35);color:var(--cream);font-size:12.5px;line-height:2;
    box-shadow:0 8px 24px rgba(25,12,4,.4);transition:opacity .5s, transform .5s;}
  #hints.hidden{opacity:0;transform:translateX(12px);pointer-events:none}
  #hints b{color:var(--gold);font-weight:600}
  #hints .row{display:flex;justify-content:space-between;align-items:center;gap:8px}
  #hints .kbd{background:rgba(234,179,94,.16);border:1px solid rgba(234,179,94,.35);border-radius:6px;
    padding:0 7px;font-size:11px;font-weight:600;color:var(--gold);white-space:nowrap;height:20px;
    display:inline-flex;align-items:center}
  #hintsClose{position:absolute;top:6px;right:9px;cursor:pointer;color:var(--gold);opacity:.7;font-size:14px}
  #lightCtl{position:fixed;top:205px;left:18px;display:flex;align-items:center;gap:10px;
    padding:9px 14px;border-radius:99px;
    background:linear-gradient(180deg,rgba(58,40,24,.92),rgba(40,27,16,.92));
    border:1px solid rgba(234,179,94,.35);color:var(--cream);
    box-shadow:0 6px 18px rgba(0,0,0,.45)}
  #lightCtl svg{width:16px;height:16px;stroke:var(--gold);fill:none;stroke-width:2;
    stroke-linecap:round;flex:none}
  #lightCtl input{-webkit-appearance:none;appearance:none;width:130px;height:5px;border-radius:99px;
    background:linear-gradient(90deg,#1a232e, var(--gold));outline:none;cursor:pointer}
  #lightCtl input::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:17px;height:17px;
    border-radius:50%;background:radial-gradient(circle at 35% 35%, #ffe6b0, var(--gold) 70%);
    border:2px solid #2a1d12;box-shadow:0 0 10px rgba(234,179,94,.7), 0 2px 5px rgba(0,0,0,.5)}
  #lightCtl input::-moz-range-thumb{width:17px;height:17px;border-radius:50%;
    background:radial-gradient(circle at 35% 35%, #ffe6b0, var(--gold) 70%);
    border:2px solid #2a1d12;box-shadow:0 0 10px rgba(234,179,94,.7)}
  #toolbar{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);display:flex;gap:8px;
    padding:10px 12px;border-radius:18px;
    background:
      linear-gradient(180deg, rgba(255,225,170,.07), rgba(0,0,0,.18)),
      repeating-linear-gradient(90deg, #3c2b1b 0 26px, #41301f 26px 52px);
    border:1.5px solid rgba(234,179,94,.45);
    box-shadow:0 10px 30px rgba(25,12,4,.5), inset 0 1px 0 rgba(255,225,170,.18);}
  .tool{position:relative;width:55px;height:62px;border-radius:13px;border:1.5px solid rgba(234,179,94,.22);
    background:linear-gradient(180deg,#4a3522,#382818);display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:3px;cursor:pointer;color:var(--cream);
    transition:transform .14s cubic-bezier(.34,1.56,.64,1), box-shadow .14s, border-color .14s;}
  .tool:hover{transform:translateY(-5px) scale(1.06);border-color:rgba(234,179,94,.6)}
  .tool.sel{border-color:var(--gold);box-shadow:0 0 0 2px rgba(234,179,94,.45), 0 6px 18px rgba(234,179,94,.3);
    background:linear-gradient(180deg,#5d4226,#46331c);transform:translateY(-6px) scale(1.08)}
  .tool svg{width:23px;height:23px;stroke:var(--cream);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
  .tool.sel svg{stroke:var(--gold)}
  .tool .lbl{font-size:9.5px;font-weight:600;letter-spacing:.3px;opacity:.9}
  .tool .key{position:absolute;top:-7px;right:-5px;width:18px;height:18px;border-radius:6px;background:var(--gold);
    color:var(--ink);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;
    box-shadow:0 2px 6px rgba(0,0,0,.4)}
  #errBar{position:fixed;left:50%;bottom:0;transform:translateX(-50%);display:none;max-width:94vw;
    padding:7px 16px;background:#5a2018;color:#ffd9c8;font-size:12px;font-family:monospace;
    border-radius:10px 10px 0 0;border:1px solid #c05438;border-bottom:none;z-index:60}
  #errBar.show{display:block}
  #missionCard{position:fixed;right:18px;bottom:76px;width:212px;padding:11px 14px;border-radius:13px;
    background:linear-gradient(180deg,rgba(58,40,24,.93),rgba(40,27,16,.93));
    border:1px solid rgba(234,179,94,.4);color:var(--cream);
    box-shadow:0 8px 22px rgba(0,0,0,.5);z-index:6}
  #missionCard .mTit{font-size:11px;font-weight:700;color:var(--gold);letter-spacing:.4px;
    text-transform:uppercase;margin-bottom:3px}
  #missionCard .mName{font-size:14.5px;font-weight:600}
  #missionCard .mDesc{font-size:12px;opacity:.9;margin-top:2px}
  #missionCard .mDesc b{color:var(--gold)}
  #missionCard .mRew{font-size:11.5px;color:var(--gold);margin-top:5px;font-weight:600}
  #vrBtn{position:fixed;right:18px;bottom:20px;display:none;padding:11px 20px;border-radius:99px;
    border:1.5px solid rgba(234,179,94,.6);cursor:pointer;font-family:'Fredoka',sans-serif;
    font-size:14px;font-weight:600;color:var(--ink);
    background:linear-gradient(180deg,#f3c87e,var(--gold));
    box-shadow:0 6px 20px rgba(234,179,94,.35), 0 4px 12px rgba(0,0,0,.5);
    transition:transform .15s}
  #vrBtn.show{display:block}
  #vrBtn.off{opacity:.5;filter:saturate(.4)}
  #vrBtn:hover{transform:translateY(-2px) scale(1.04)}
  #lvlRow{display:flex;align-items:center;gap:8px;margin-top:10px}
  #lvlBadge{padding:5px 12px;border-radius:99px;font-size:13px;font-weight:700;color:var(--ink);
    background:linear-gradient(180deg,#f3c87e,var(--gold));
    box-shadow:0 3px 10px rgba(234,179,94,.4), inset 0 1px 0 rgba(255,240,210,.6)}
  #wxHud{font-size:16px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.6))}
  #goldHud{padding:5px 11px;border-radius:99px;font-size:13px;font-weight:600;color:var(--gold);
    background:linear-gradient(180deg,var(--walnut-2),var(--walnut));
    border:1px solid rgba(234,179,94,.4)}
  .exBtn{padding:4px 12px;border-radius:99px;border:1px solid rgba(234,179,94,.6);cursor:pointer;
    font-family:'Fredoka',sans-serif;font-size:11.5px;font-weight:700;color:var(--ink);
    background:linear-gradient(180deg,#f3c87e,var(--gold))}
  .exBtn.off{opacity:.45;cursor:default}
  .exInfo{font-style:normal;font-size:10px;opacity:.75;margin-left:4px}
  #prog{width:172px;height:6px;background:rgba(0,0,0,.5);border:1px solid rgba(234,179,94,.3);
    border-radius:99px;margin-top:9px;overflow:hidden}
  #progFill{height:100%;width:0%;background:linear-gradient(90deg,#b07c3a,var(--gold),#ffe2a8);
    transition:width .45s ease;border-radius:99px}
  #nextLbl{font-size:11.5px;color:var(--cream);opacity:.85;margin-top:5px;font-weight:500;
    text-shadow:0 1px 4px rgba(0,0,0,.6)}
  #variantBar{position:fixed;left:50%;bottom:116px;transform:translateX(-50%);display:flex;gap:6px;
    max-width:94vw;flex-wrap:wrap;justify-content:center;z-index:5}
  .pill{padding:5px 13px;border-radius:99px;background:linear-gradient(180deg,#4a3522,#382818);
    border:1.5px solid rgba(234,179,94,.25);color:var(--cream);font-size:12px;font-weight:600;
    cursor:pointer;transition:transform .12s,border-color .12s;white-space:nowrap}
  .pill i{font-style:normal;opacity:.7;font-size:10px}
  .pill:hover{transform:translateY(-2px);border-color:rgba(234,179,94,.55)}
  .pill.sel{border-color:var(--gold);color:var(--gold);background:linear-gradient(180deg,#5d4226,#46331c)}
  .pill.lk{opacity:.5}
  #matBar{position:fixed;left:50%;bottom:160px;transform:translateX(-50%);display:flex;gap:9px;
    padding:7px 12px;border-radius:99px;background:rgba(40,27,16,.9);
    border:1px solid rgba(234,179,94,.3);z-index:5;box-shadow:0 4px 14px rgba(0,0,0,.4)}
  .swatch{width:25px;height:25px;border-radius:50%;cursor:pointer;position:relative;
    border:2px solid rgba(234,179,94,.25);
    background:radial-gradient(circle at 32% 28%, var(--c2), var(--c1) 75%);
    transition:transform .12s, box-shadow .12s}
  .swatch:hover{transform:scale(1.18)}
  .swatch.sel{border-color:var(--gold);box-shadow:0 0 10px rgba(234,179,94,.65)}
  .swatch.lk{opacity:.4;filter:grayscale(.5)}
  .swatch .mini{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px}
  #catBtn{position:fixed;left:18px;top:255px;padding:8px 15px;border-radius:99px;cursor:pointer;
    background:linear-gradient(180deg,rgba(58,40,24,.92),rgba(40,27,16,.92));
    border:1px solid rgba(234,179,94,.4);color:var(--gold);font-size:13px;font-weight:600;
    box-shadow:0 5px 16px rgba(0,0,0,.45);transition:transform .14s}
  #catBtn:hover{transform:scale(1.06)}
  #catBtn .kbd2{background:rgba(234,179,94,.18);border:1px solid rgba(234,179,94,.4);
    border-radius:5px;padding:0 5px;font-size:10px;margin-left:3px}
  #catModal{position:fixed;inset:0;background:rgba(4,7,10,.72);display:none;z-index:40;
    backdrop-filter:blur(3px)}
  #catModal.show{display:flex;align-items:center;justify-content:center;flex-direction:column}
  #catModal.show{padding:5vh 6vw}
  #catModal > #catHead, #catModal > #catGrid{
    background:
      linear-gradient(180deg, rgba(255,225,170,.05), rgba(0,0,0,.15)),
      repeating-linear-gradient(90deg, #3c2b1b 0 30px, #41301f 30px 60px)}
  #catModal > #catHead{border:1.5px solid rgba(234,179,94,.45);border-bottom:none;
    border-radius:16px 16px 0 0;max-width:880px}
  #catModal > #catGrid{border:1.5px solid rgba(234,179,94,.45);border-top:none;
    border-radius:0 0 16px 16px;max-width:880px;box-shadow:0 18px 50px rgba(0,0,0,.6)}
  #catHead{display:flex;align-items:baseline;gap:14px;padding:16px 22px 10px;position:relative}
  #catHead h2{font-size:19px;color:var(--gold)}
  #catHead span{font-size:12.5px;color:var(--cream);opacity:.85}
  #catHead b{color:var(--gold)}
  #catClose{position:absolute;right:16px;top:14px;cursor:pointer;color:var(--gold);
    font-size:17px;opacity:.8}
  #catReset{position:absolute;right:48px;top:15px;cursor:pointer;color:var(--cream);
    font-size:13px;opacity:.6}
  #catReset:hover{opacity:1}
  #catGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:12px;
    padding:6px 22px 20px;overflow-y:auto;max-height:calc(82vh - 60px)}
  #catModal > *{}
  #catModal.show::before{content:''}
  #catGrid, #catHead{width:100%}
  #catModal.show > #catHead, #catModal.show > #catGrid{}
  .catSec{background:linear-gradient(180deg,#43301d,#352617);border:1px solid rgba(234,179,94,.25);
    border-radius:13px;padding:11px 13px}
  .catSec h3{font-size:13px;color:var(--gold);display:flex;align-items:center;gap:7px;
    margin-bottom:7px;font-weight:600}
  .catSec h3 svg{width:16px;height:16px;stroke:var(--gold);fill:none;stroke-width:1.8}
  .catItem{display:flex;justify-content:space-between;align-items:center;font-size:12.5px;
    color:var(--cream);padding:4px 7px;border-radius:7px}
  .catItem .st{font-size:11px;color:#9fd98a;font-weight:600}
  .catItem.lk{opacity:.55}
  .catItem.lk .st{color:#c8a86f}
  .catItem.next{outline:1.5px solid var(--gold);background:rgba(234,179,94,.12);opacity:1;
    animation:nextPulse 1.6s ease-in-out infinite}
  .catItem.next .st{color:var(--gold)}
  @keyframes nextPulse{50%{box-shadow:0 0 14px rgba(234,179,94,.5)}}
  .catItem .dot{display:inline-block;width:11px;height:11px;border-radius:50%;margin-right:6px;
    background:radial-gradient(circle at 32% 28%, var(--c2), var(--c1) 75%);vertical-align:-1px}
  #toast.unlock{border-color:var(--gold);color:#ffe9c4;
    background:linear-gradient(180deg,#6b4a26,#3a2a1c);
    box-shadow:0 0 28px rgba(234,179,94,.55), 0 6px 18px rgba(0,0,0,.5)}
  #toast{position:fixed;left:50%;bottom:206px;transform:translateX(-50%) translateY(8px);padding:9px 20px;
    border-radius:99px;background:rgba(40,27,16,.92);border:1px solid rgba(234,179,94,.4);color:var(--cream);
    font-size:14px;font-weight:500;opacity:0;transition:opacity .35s, transform .35s;pointer-events:none;
    box-shadow:0 6px 18px rgba(25,12,4,.4);white-space:nowrap}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  #toast b{color:var(--gold)}
  @media (max-width:680px){
    #hints{display:none}
    .tool{width:50px;height:56px}
    .tool .lbl{font-size:9px}
    #titleCard h1{font-size:18px}
  }
  @media (prefers-reduced-motion:reduce){ .tool,.tool:hover,.tool.sel{transition:none;transform:none} }
</style>
</head>
<body>
<canvas id="scene"></canvas>
<div id="vignette"></div>

<div id="titleCard">
  <h1>Claro del Bosque</h1>
  <p>Taller de construcción en madera <span id="verTag"></span></p>
  <div id="lvlRow">
    <span id="lvlBadge">Nv 1</span>
    <span id="goldHud">🪙 0</span>
    <span id="wxHud" title="Clima">☀️</span>
    <span id="counter">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-6 9 6v11a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1z"/></svg>
      <span id="countNum">0</span>
    </span>
  </div>
  <div id="prog"><div id="progFill"></div></div>
  <div id="nextLbl"></div>
</div>

<div id="lightCtl" title="Luz del teatro">
  <svg viewBox="0 0 24 24"><path d="M12 3a7 7 0 0 0-4 12.7V18a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1v-2.3A7 7 0 0 0 12 3z"/><path d="M10 21h4"/></svg>
  <input type="range" id="lightSlider" min="0" max="100" value="26" aria-label="Cantidad de luz">
</div>

<div id="hints">
  <span id="hintsClose">✕</span>
  <b>Cómo se juega</b><br>
  <div class="row"><span>Moverse</span><span class="kbd">W A S D</span></div>
  <div class="row"><span>Colocar pieza</span><span class="kbd">Clic izq.</span></div>
  <div class="row"><span>Girar pieza</span><span class="kbd">Rueda</span></div>
  <div class="row"><span>Variante</span><span class="kbd">Repite 1–7</span></div>
  <div class="row"><span>Material</span><span class="kbd">Q / E</span></div>
  <div class="row"><span>Catálogo</span><span class="kbd">C</span></div>
  <div class="row"><span>Quitar pieza</span><span class="kbd">Clic der.</span></div>
  <div class="row"><span>Cámara</span><span class="kbd">Arrastrar der.</span></div>
  <div class="row"><span>Zoom</span><span class="kbd">Mayús+rueda</span></div>
  <div class="row"><span>Modo paseo</span><span class="kbd">0 / Esc</span></div>
</div>

<div id="catBtn">📖 Catálogo <span class="kbd2">C</span></div>
<div id="catModal"></div>
<div id="matBar"></div>
<div id="variantBar"></div>
<div id="toolbar"></div>
<div id="toast"></div>
<div id="missionCard" style="display:none"></div>
<div id="errBar"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
'use strict';
const GAME_VERSION = 'v1.9.0';
console.log('%cClaro del Bosque '+GAME_VERSION, 'color:#eab35e;font-weight:bold;font-size:14px');
const C  = 2.0;      // tamaño de celda
const WH = 2.2;      // altura de muro / nivel
const PLATEAU_R = 16;

/* ---------- renderer / escena ---------- */
const canvas = document.getElementById('scene');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.95;

const scene = new THREE.Scene();
const FOG_COLOR = 0x0c1116;
scene.fog = new THREE.Fog(FOG_COLOR, 11, 36);
scene.background = new THREE.Color(FOG_COLOR);
const camera = new THREE.PerspectiveCamera(46, innerWidth/innerHeight, 0.1, 300);
const rig = new THREE.Group();      // soporte de cámara y mandos (sin escala)
rig.add(camera); scene.add(rig);
const world = new THREE.Group();    // TODO el diorama vive aquí; en VR se escala a mesa
scene.add(world);

/* ---------- cielo degradado ---------- */
let skyMat=null, starMat=null;
(function makeSky(){
  const g = new THREE.SphereGeometry(170, 24, 18);
  const pos = g.attributes.position;
  const cols = new Float32Array(pos.count*3);
  const zen = new THREE.Color(0x04070c), hor = new THREE.Color(0x18222e), low = new THREE.Color(0x05080b);
  const tmp = new THREE.Color();
  for(let i=0;i<pos.count;i++){
    const t = pos.getY(i)/170;
    if(t>=0){ tmp.copy(hor).lerp(zen, Math.pow(Math.min(t*1.4,1), .8)); }
    else    { tmp.copy(hor).lerp(low, Math.min(-t*2,1)); }
    cols[i*3]=tmp.r; cols[i*3+1]=tmp.g; cols[i*3+2]=tmp.b;
  }
  g.setAttribute('color', new THREE.BufferAttribute(cols,3));
  skyMat = new THREE.MeshBasicMaterial({vertexColors:true, side:THREE.BackSide, fog:false, depthWrite:false});
  const sky = new THREE.Mesh(g,skyMat); sky.renderOrder=-10; scene.add(sky);
})();

/* ---------- rig de teatro: el diorama iluminado en la oscuridad ---------- */
const hemi = new THREE.HemisphereLight(0x34465c, 0x141a12, 0.28);
scene.add(hemi);
const amb = new THREE.AmbientLight(0x26384c, 0.09);
scene.add(amb);
// luz principal cálida y rasante (con sombras)
const sun = new THREE.DirectionalLight(0xffc488, 0.95);
sun.position.set(17, 11, 9);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left=-20; sun.shadow.camera.right=20;
sun.shadow.camera.top=20;  sun.shadow.camera.bottom=-20;
sun.shadow.camera.near=2;  sun.shadow.camera.far=60;
sun.shadow.bias=-0.0006;
sun.shadow.radius=4;
world.add(sun); world.add(sun.target);
// foco de escenario: un cono suave que baña la meseta desde arriba
const spot = new THREE.SpotLight(0xfff0d6, 0.85, 0, 0.62, 0.75, 1.6);
spot.position.set(7, 22, 5);
spot.target.position.set(0, 0, 0);
world.add(spot); world.add(spot.target);
// contraluz frío para recortar siluetas
const rim = new THREE.DirectionalLight(0x4f6f9e, 0.55);
rim.position.set(-12, 9, -14); world.add(rim); world.add(rim.target);
// farolillo: corazón cálido constante (no depende del slider)
const lantern = new THREE.PointLight(0xffa45e, 1.45, 13, 2);
lantern.position.set(10.6, 2.1, 7.2); world.add(lantern);
// tenue relleno sobre la parcela para leer lo construido
const plotGlow = new THREE.PointLight(0xffdcae, 0.22, 20, 2);
plotGlow.position.set(0, 5, 0); world.add(plotGlow);

/* ---------- estrellas tenues en la negrura ---------- */
(function stars(){

/* ---------- haces de luz entre los árboles (estilo Moss) ---------- */
let shaftMat;
(function lightShafts(){
  const cv=document.createElement('canvas'); cv.width=64; cv.height=256;
  const g2=cv.getContext('2d');
  const grad=g2.createLinearGradient(0,0,0,256);
  grad.addColorStop(0,'rgba(255,235,190,0.9)');
  grad.addColorStop(0.55,'rgba(255,228,178,0.35)');
  grad.addColorStop(1,'rgba(255,225,170,0)');
  g2.fillStyle=grad; g2.fillRect(0,0,64,256);
  const grad2=g2.createLinearGradient(0,0,64,0);
  grad2.addColorStop(0,'rgba(0,0,0,1)'); grad2.addColorStop(0.25,'rgba(0,0,0,0)');
  grad2.addColorStop(0.75,'rgba(0,0,0,0)'); grad2.addColorStop(1,'rgba(0,0,0,1)');
  g2.globalCompositeOperation='destination-out';
  g2.fillStyle=grad2; g2.fillRect(0,0,64,256);
  const tex=new THREE.CanvasTexture(cv);
  shaftMat=new THREE.MeshBasicMaterial({map:tex, transparent:true, opacity:.1,
    blending:THREE.AdditiveBlending, depthWrite:false, side:THREE.DoubleSide, fog:false});
  const az=Math.atan2(sun.position.x, sun.position.z);
  const lean=Math.atan2(Math.hypot(sun.position.x, sun.position.z), sun.position.y);
  [[-9.5,-4.8,3.2,13],[6.2,-11.5,2.6,11],[-11.8,7.4,2.2,10],[12.6,-6.8,2.0,9]].forEach(sd=>{
    const grp=new THREE.Group();
    const plane=new THREE.Mesh(new THREE.PlaneGeometry(sd[2], sd[3]), shaftMat);
    plane.rotation.x=-lean*0.55;
    grp.add(plane);
    grp.rotation.y=az;
    grp.position.set(sd[0], sd[3]*0.32, sd[1]);
    world.add(grp);
  });
})();

/* ---------- slider: cantidad de luz del teatro ---------- */
const RIG = { hemi:hemi.intensity, amb:amb.intensity, sun:sun.intensity,
              spot:spot.intensity, rim:rim.intensity, glow:plotGlow.intensity };
const LIT={hemi:0,amb:0,sun:0,spot:0,rim:0,glow:0,exp:1,shaft:0};
function applyLight(f){            // f en [0,1] · el ciclo día/noche modula encima
  const k = 0.035 + f*1.75;
  LIT.hemi=RIG.hemi*k; LIT.amb=RIG.amb*k; LIT.sun=RIG.sun*k; LIT.spot=RIG.spot*k;
  LIT.rim=RIG.rim*(0.1+f*1.35); LIT.glow=RIG.glow*(0.3+f*1.0);
  LIT.shaft=0.004+f*0.16; LIT.exp=0.72+f*0.4;
}

function updateSky(dt){
  // clima: transición suave hacia el objetivo
  wxTimer-=dt; if(wxTimer<=0) pickWeather();
  const W=WX_DEFS[wxName], lk=Math.min(1, dt*.45);
  ['cloud','fogN','fogF','fogG','rain','wind','light'].forEach(function(kk){
    wxCur[kk]+= (W[kk]-wxCur[kk])*lk;
  });
  windK = wxCur.wind;
  // ciclo solar
  const cyc=((T/DAY_LEN)+0.22)%1;
  const sunUp=Math.max(0, Math.sin(cyc*Math.PI*2));
  const nightUp=Math.max(0, -Math.sin(cyc*Math.PI*2));
  const wl=wxCur.light;
  sun.color.copy(SUN_WARM).lerp(MOON, nightUp);
  const vr = renderer.xr.isPresenting;
  sun.intensity = Math.max(vr?0.35:0, LIT.sun * (0.32+sunUp*1.05) * wl);
  spot.intensity= Math.max(vr?0.3:0,  LIT.spot * (0.55+sunUp*.55) * wl);
  hemi.intensity= Math.max(vr?0.2:0,  LIT.hemi * (0.5+sunUp*.75) * wl);
  amb.intensity = Math.max(vr?0.08:0, LIT.amb * (0.6+sunUp*.6) * wl);
  rim.intensity = LIT.rim * (0.55+nightUp*.65);
  plotGlow.intensity = Math.max(vr?0.18:0, LIT.glow);
  renderer.toneMappingExposure = Math.max(vr?0.85:0, LIT.exp * (0.86+sunUp*.22));
  if(shaftMat) shaftMat.opacity = LIT.shaft * sunUp * Math.max(0,1-wxCur.cloud) * wl;
  if(skyMat){
    const b=1+3.3*sunUp*wl;
    skyMat.color.setRGB(b, b*.97, b*.9);
  }
  if(starMat) starMat.opacity = (.08+nightUp*.55) * Math.max(.15, 1-wxCur.cloud);
  // niebla (en VR la mesa no lleva niebla)
  if(!renderer.xr.isPresenting){
    scene.fog.near = wxCur.fogN;
    scene.fog.far  = wxCur.fogF;
    scene.fog.color.copy(FOG_NIGHT).lerp(FOG_GRIS, wxCur.fogG*(0.4+sunUp*.6));
    scene.background.copy(scene.fog.color);
  }
  // nubes
  for(const cl of clouds){
    cl.position.x += cl.userData.spd * windK * dt;
    if(cl.position.x>26) cl.position.x=-26;
    const want=wxCur.cloud*cl.userData.op;
    cl.userData.mat.opacity += (want-cl.userData.mat.opacity)*Math.min(1,dt*1.5);
  }
  // lluvia
  rainOp += (wxCur.rain - rainOp)*Math.min(1, dt*.8);
  rainMat.opacity = rainOp*.55;
  if(rainOp>0.02){
    const arr=rainGeo.attributes.position;
    for(let i=0;i<RAIN_N;i++){
      let y=arr.getY(i) - (12+ (i%5))*dt;
      let floorY=0;
      if(coveredTop.size){
        const k=Math.round(arr.getX(i)/C)+':'+Math.round(arr.getZ(i)/C);
        const t=coveredTop.get(k);
        if(t!==undefined) floorY=t;     // la gota muere sobre el tejado
      }
      if(y<floorY){ y=13+Math.random(); }
      arr.setY(i, y);
    }
    arr.needsUpdate=true;
  }
  // relámpagos
  if(WX_DEFS[wxName].storm && wxCur.rain>.6 && Math.random()<dt*.16){
    flashI=1.15;
    setTimeout(function(){ sfx.thunder(); }, 250+Math.random()*600);
  }
  if(flashI>0){
    renderer.toneMappingExposure += flashI*.9;
    hemi.intensity += flashI*1.6;
    flashI *= Math.pow(.0003, dt);
    if(flashI<.01) flashI=0;
  }
}

/* =====================================================================
   util: fusionar cajas/geometrías con color por vértice
   ===================================================================== */
function mergeParts(parts){
  const P=[], N=[], Col=[], I=[]; let off=0;
  const tmp = new THREE.Color(), e = new THREE.Euler(), m = new THREE.Matrix4();
  for(const p of parts){
    const g = p.geo ? p.geo : new THREE.BoxGeometry(p.w, p.h, p.d);
    e.set(p.rx||0, p.ry||0, p.rz||0);
    m.makeRotationFromEuler(e); m.setPosition(p.x||0, p.y||0, p.z||0);
    g.applyMatrix4(m);
    const pa=g.attributes.position, na=g.attributes.normal;
    tmp.set(p.c);
    if(p.jit!==false) tmp.offsetHSL((Math.random()-.5)*0.01,(Math.random()-.5)*0.05,(Math.random()-.5)*0.05);
    for(let i=0;i<pa.count;i++){
      P.push(pa.getX(i), pa.getY(i), pa.getZ(i));
      N.push(na.getX(i), na.getY(i), na.getZ(i));
      Col.push(tmp.r, tmp.g, tmp.b);
    }
    const idx=g.index.array;
    for(let i=0;i<idx.length;i++) I.push(idx[i]+off);
    off += pa.count;
    g.dispose();
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(P,3));
  geo.setAttribute('normal',   new THREE.Float32BufferAttribute(N,3));
  geo.setAttribute('color',    new THREE.Float32BufferAttribute(Col,3));
  geo.setIndex(I);
  return geo;
}

/* desvanecimiento hacia el borde del mundo: 1 en el centro, ~0 en el perímetro */
function rimFade(r){
  const t=Math.min(1, Math.max(0, (r-9.2)/(15.9-9.2)));
  const sm=t*t*(3-2*t);
  return Math.max(0.03, 1-sm);
}
/* atenúa el atributo de color de una geometría según el radio de cada vértice */
function fadeGeometryByRadius(geo, flatXY){
  const pos=geo.attributes.position, col=geo.attributes.color;
  for(let i=0;i<pos.count;i++){
    const r = flatXY ? Math.hypot(pos.getX(i), pos.getY(i))
                     : Math.hypot(pos.getX(i), pos.getZ(i));
    const f=rimFade(r);
    col.setXYZ(i, col.getX(i)*f, col.getY(i)*f, col.getZ(i)*f);
  }
  col.needsUpdate=true;
}

function makeSparkles(n, color, size, opacity){
  const pos=new Float32Array(n*3), seed=[];
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, r=Math.random()*14+2;
    pos[i*3]=Math.cos(a)*r; pos[i*3+1]=Math.random()*4+.4; pos[i*3+2]=Math.sin(a)*r;
    seed.push(Math.random()*10);
  }
  const g=new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(pos,3));
  const m=new THREE.PointsMaterial({color, size, transparent:true, opacity,
    blending:THREE.AdditiveBlending, depthWrite:false, sizeAttenuation:true});
  const pts=new THREE.Points(g,m); pts.userData.seed=seed; world.add(pts);
  return pts;
}

const matCache={};
function materialFor(m){
  if(!matCache[m.id]) matCache[m.id]=new THREE.MeshStandardMaterial(
    {vertexColors:true, metalness:m.metal, roughness:m.rough});
  return matCache[m.id];
}
/* variantes con tinte de pintura y acabado rugoso/pulido */
const matVarCache={};
function variantMaterial(matId, tint, finish){
  const k=matId+'|'+(tint==null?'n':tint)+'|'+(finish||'n');
  if(matVarCache[k]) return matVarCache[k];
  const base=MATERIALS.find(function(m){return m.id===matId;}) || MATERIALS[0];
  let metal=base.metal, rough=base.rough;
  if(finish==='rough'){ rough=.96; metal=base.metal*.5; }
  if(finish==='polish'){ rough=.12; metal=Math.max(base.metal,.35); }
  const m=new THREE.MeshStandardMaterial({vertexColors:true, metalness:metal, roughness:rough});
  if(tint!=null) m.color.set(tint);
  matVarCache[k]=m;
  return m;
}
function applyFinishTo(mesh){
  const vm=variantMaterial(mesh.userData.matId, mesh.userData.tint, mesh.userData.finish);
  mesh.material=vm;
  mesh.children.forEach(function(ch){ if(ch.isMesh && ch.userData.tintable) ch.material=vm; });
}

function stairParts(P){

const geoCache={}, leafCache={};
function geoFor(def, m){
  const k=def.id+':'+m.id;
  if(!geoCache[k]) geoCache[k]=def.build(m);
  return geoCache[k];
}
function leafFor(def, m){
  const k=def.id+':'+m.id;
  if(!leafCache[k]) leafCache[k]=def.leaf(m);
  return leafCache[k];
}

function isUnlockedDef(d){ return level >= d.at; }

function xpNeed(L){ return 70 + (L-1)*30; }
function xpFor(def, M){ return Math.round(8 + def.at*1.4 + M.at*1.6 + (def.xpb||0)); }

function gainXP(n){
  xp += n;
  while(xp >= xpNeed(level)){
    xp -= xpNeed(level);
    level++;
    onLevelUp(level);
  }
  updateCounter();
}
function onLevelUp(L){
  const reward = 25 + L*12;
  gold += reward;
  sfx.levelup();
  vrPulse(1, 200);
  dustAt(charState.pos.x, charState.pos.y+1.3, charState.pos.z,
    {count:34, color:0xffd98a, size:.18, life:1.3, o0:1, grav:1.0, vy:[1.4,3.4], lat:2.8, spread:.7});
  toastUnlock('⭐ ¡Nivel '+L+'! · +'+reward+' 🪙');
  // anunciar lo desbloqueado en este nivel, escalonado
  let delay=1500;
  UNLOCKS.forEach(function(u){
    if(u.at===L && !announced.has(u.at+u.name)){
      announced.add(u.at+u.name);
      setTimeout(function(){ toastUnlock('¡Desbloqueado! '+u.name); sfx.unlock(); }, delay);
      delay+=1500;
    }
  });
  const ex=EXPANSIONS[expansions];
  if(ex && L>=ex.lvl){
    setTimeout(function(){ toast('🌍 Puedes <b>ampliar el terreno</b> en el Catálogo (C)'); }, delay);
  }
  renderBuildUI();
  if(catOpen) renderCatalog();
  saveSoon();
}
function buyExpansion(i){
  const ex=EXPANSIONS[i];
  if(!ex || i!==expansions) return;
  if(level<ex.lvl){ toast('🔒 Necesitas el nivel <b>'+ex.lvl+'</b>'); sfx.deny(); return; }
  if(gold<ex.cost){ toast('Te faltan <b>'+(ex.cost-gold)+'</b> 🪙'); sfx.deny(); return; }
  gold-=ex.cost; expansions++;
  buildR=ex.buildR; walkR=PLATEAU_R*ex.k-0.9;
  SHADOW_R=20+expansions*4;
  if(!renderer.xr.isPresenting){
    sun.shadow.camera.left=-SHADOW_R; sun.shadow.camera.right=SHADOW_R;
    sun.shadow.camera.top=SHADOW_R; sun.shadow.camera.bottom=-SHADOW_R;
    sun.shadow.camera.updateProjectionMatrix();
  }
  // rejilla nueva a medida
  world.remove(grid);
  grid=new THREE.GridHelper(ex.grid, ex.grid/2, 0xd9b98a, 0xc6a071);
  grid.position.y=0.03;
  grid.material.transparent=true; grid.material.opacity=0;
  world.add(grid);
  growAnim={from:(expansions===1?1:EXPANSIONS[expansions-2].k), to:ex.k, t:0};
  // estallido en el perímetro
  for(let a=0;a<10;a++){
    const ang=a/10*Math.PI*2, r=buildR*0.95;
    dustAt(Math.cos(ang)*r, .4, Math.sin(ang)*r,
      {count:8, color:0xc8a878, size:.16, life:1.0, o0:.9, grav:2.2, vy:[1,2.6], lat:1.4, spread:.6});
  }
  sfx.expand();
  toastUnlock('🌍 ¡Terreno ampliado! El claro crece…');
  updateCounter(); renderCatalog();
  saveSoon();
}

const ray = new THREE.Raycaster();
const mouseNDC = new THREE.Vector2(-2,-2);
let lastPlacement = null;

function getPlacement(def, rot, hit){
  const p=hit.point;
  const lv=Math.max(0, Math.min(3, Math.floor((p.y+0.15)/WH)));
  let pos, key, rotY=rot*Math.PI/2;
  if(def.kind==='cell'){
    const cx=Math.round(p.x/C), cz=Math.round(p.z/C);
    pos=new THREE.Vector3(cx*C, lv*WH, cz*C);
    if(def.rot2) rotY=(rot%2)*Math.PI/2;
    key=def.prefix+':'+lv+':'+cx+':'+cz;
  } else {
    const axis=rot%2;
    let x,z;
    if(axis===0){ x=Math.round(p.x/C)*C; z=(Math.round(p.z/C-0.5)+0.5)*C; }
    else        { z=Math.round(p.z/C)*C; x=(Math.round(p.x/C-0.5)+0.5)*C; }
    pos=new THREE.Vector3(x, lv*WH, z);
    const side = def.side ? (rot>=2?1:0) : '';
    key=def.prefix+':'+lv+':'+axis+':'+x.toFixed(1)+':'+z.toFixed(1)+(def.side?(':'+side):'');
  }
  const inZone = Math.abs(pos.x)<=buildR && Math.abs(pos.z)<=buildR;
  const valid = inZone && !pieces.has(key);
  return {pos:pos, rotY:rotY, key:key, valid:valid, def:def, lv:lv};
}

function updateGhost(){
  if(menuHover){ ghost.visible=false; lastPlacement=null; return; }
  if(!selected || selected.tool){ ghost.visible=false; lastPlacement=null; return; }
  if(renderer.xr.isPresenting && ctrlR){ setRayFromController(ctrlR); }
  else { ray.setFromCamera(mouseNDC, camera); }
  const targets = walkables.concat(piecesGroup.children);
  const hits = ray.intersectObjects(targets, true);
  if(!hits.length){ ghost.visible=false; lastPlacement=null; return; }
  const lp = hits[0].point.clone(); world.worldToLocal(lp);
  const pl = getPlacement(selected, rotIndex, {point:lp});
  lastPlacement = pl;
  ghost.geometry = geoFor(selected, MATERIALS[selMat]);
  ghost.material = pl.valid ? ghostOK : ghostBAD;
  ghost.position.copy(pl.pos);
  ghost.rotation.set(0, pl.rotY, 0);
  ghost.visible = true;
}

const coveredTop=new Map();   // celda -> altura del techo más alto
function roofTopOf(d, lv){
  if(d.prefix==='F') return lv*WH+0.12;
  if(d.id==='t_alt') return lv*WH+1.9;
  if(d.id==='t_cup') return lv*WH+1.25;
  if(d.id==='t_pla') return lv*WH+0.25;
  if(d.id==='t_una') return lv*WH+1.1;
  return lv*WH+1.0;               // dos aguas
}
function updateCovered(){
  coveredCells.clear();
  coveredTop.clear();
  pieces.forEach(function(mesh){
    const d=DEFS[mesh.userData.varId]; if(!d) return;
    const lv=Math.round(mesh.position.y/WH);
    if(d.prefix==='R' || (d.prefix==='F' && lv>=1)){
      const k=Math.round(mesh.position.x/C)+':'+Math.round(mesh.position.z/C);
      coveredCells.add(k);
      const top=roofTopOf(d, lv);
      if(!coveredTop.has(k) || coveredTop.get(k)<top) coveredTop.set(k, top);
    }
  });
}

const anims=[];
const glowMatWarm=new THREE.MeshStandardMaterial({color:0xffd9a0, emissive:0xff9a45, emissiveIntensity:1.15});
const glowMatHot =new THREE.MeshStandardMaterial({color:0xffb070, emissive:0xff5a1a, emissiveIntensity:1.5});
function glowMeshFor(def){
  const g=def.glow; let geo;
  if(g.k==='cone') geo=new THREE.ConeGeometry(g.s[0], g.s[1], 7);
  else if(g.k==='sphere') geo=new THREE.SphereGeometry(g.s[0], 9, 7);
  else geo=new THREE.BoxGeometry(g.s[0], g.s[1], g.s[2]);
  const m=new THREE.Mesh(geo, g.c?glowMatHot:glowMatWarm);
  m.position.set(g.p[0], g.p[1], g.p[2]);
  if(g.flat) m.scale.y=.45;
  return m;
}
function applyTool(){
  if(renderer.xr.isPresenting && ctrlR){ setRayFromController(ctrlR); }
  else { ray.setFromCamera(mouseNDC, camera); }
  const hits=ray.intersectObjects(piecesGroup.children, true);
  if(!hits.length){ sfx.deny(); return; }
  let obj=hits[0].object;
  while(obj.parent && obj.parent!==piecesGroup) obj=obj.parent;
  if(!obj.userData || !obj.userData.key) return;
  if(selected.tool==='paint'){
    obj.userData.tint = PAINTS[selPaint].c;
    paintedCount++;
  } else {
    obj.userData.finish = (obj.userData.finish===selected.f) ? null : selected.f;
  }
  applyFinishTo(obj);
  dustAt(obj.position.x, obj.position.y+.6, obj.position.z,
    {count:10, color:(selected.tool==='paint'&&PAINTS[selPaint].c!=null)?PAINTS[selPaint].c:0xe6d2ae,
     size:.12, life:.55, o0:.85, grav:1.4, vy:[.5,1.6], lat:1.2, spread:.7});
  sfx.paint();
  gainXP(3);
  vrPulse(0.5, 30);
  missionTick();
  saveSoon();
}
function spawnPiece(def, M, pos, rotY, key, tint, finish){
  const mesh=new THREE.Mesh(geoFor(def, M), materialFor(M));
  mesh.castShadow=true; mesh.receiveShadow=true;
  mesh.position.copy(pos); mesh.rotation.y=rotY;
  mesh.userData={key:key, varId:def.id, matId:M.id, tint:(tint!=null?tint:null), finish:finish||null};
  piecesGroup.add(mesh);
  pieces.set(key, mesh);
  if(def.door && def.leaf){
    const hingeW = (def.id==='p_por') ? -0.75 : (def.leaf2 ? -0.66 : -0.46);
    const leaf=new THREE.Mesh(leafFor(def, M), materialFor(M));
    leaf.castShadow=true; leaf.userData.tintable=true;
    leaf.position.set(hingeW, 0, 0);
    leaf.rotation.y=-0.06;
    mesh.add(leaf);
    const entry={mesh:mesh, leaf:leaf, slow:!!def.slow};
    if(def.leaf2){
      const k2=def.id+'R:'+M.id;
      if(!leafCache[k2]) leafCache[k2]=def.leaf2(M);
      const leaf2=new THREE.Mesh(leafCache[k2], materialFor(M));
      leaf2.castShadow=true; leaf2.userData.tintable=true;
      leaf2.position.set(0.66, 0, 0);
      leaf2.rotation.y=0.06;
      mesh.add(leaf2);
      entry.leaf2=leaf2;
    }
    doors.push(entry);
  }
  if(def.chimney) chimneys.push(mesh);
  if(def.anim){
    def.anim.forEach(function(a,ai){
      const k=def.id+':'+ai+':'+M.id;
      if(!geoCache[k]) geoCache[k]=a.b(M);
      const ch=new THREE.Mesh(geoCache[k], materialFor(M));
      ch.castShadow=true; ch.userData.tintable=true;
      ch.position.set(a.p[0], a.p[1], a.p[2]);
      mesh.add(ch);
      spinners.push({m:ch, root:mesh, axis:a.axis, spd:a.spd, mode:a.mode||'spin',
        amp:a.amp||0, base:a.p[1], ph:Math.random()*9, wind:!!a.wind});
    });
  }
  if(def.fountain) fountains.push(mesh);
  if(def.light){
    const glow=glowMeshFor(def);
    mesh.add(glow);
    if(placedLights.length < MAX_LIGHTS){
      const lp=def.light;
      const L=new THREE.PointLight(lp.c, lp.i, lp.d, 2);
      L.position.set(lp.p[0], lp.p[1], lp.p[2]);
      L.userData={baseDist:lp.d, base:lp.i, ph:Math.random()*9};
      if(renderer.xr.isPresenting) L.distance = lp.d * (1/16);
      mesh.add(L); mesh.userData.lightRef=L;
      placedLights.push(L);
    } else {
      toast('Máximo de '+MAX_LIGHTS+' luces encendidas · esta queda apagada');
    }
  }

  if(mesh.userData.tint!=null || mesh.userData.finish) applyFinishTo(mesh);
  return mesh;
}
function placePiece(){
  if(renderer.xr.isPresenting && ctrlR && buildMenu.visible){
    setRayFromController(ctrlR);
    const mh=ray.intersectObject(buildMenu, false);
    if(mh.length){ menuClickAt(mh[0].uv); return; }
  }
  if(selected && selected.tool){ applyTool(); return; }
  if(!selected || !lastPlacement || !lastPlacement.valid){
    if(lastPlacement && !lastPlacement.valid) sfx.deny();
    return;
  }
  const pl=lastPlacement, def=pl.def, M=MATERIALS[selMat];
  const mesh=spawnPiece(def, M, pl.pos, pl.rotY, pl.key, null, null);
  pieceCount++; totalPlaced++;
  if(!firstUse.has(def.id)){
    firstUse.add(def.id);
    gold+=15; sfx.coin();
    toast('Primera <b>'+def.name+'</b> · +15 🪙');
  }
  updateCovered();
  gainXP(xpFor(def, M));
  anims.push({mesh:mesh, t:0});
  dustAt(pl.pos.x, pl.pos.y+.3, pl.pos.z);
  sfx.place();
  vrPulse(0.75, 45);
  updateGhost();
  missionTick();
  saveSoon();
}

function removeWithRaycaster(){
  const hits = ray.intersectObjects(piecesGroup.children, true);
  if(!hits.length) return;
  let obj=hits[0].object;
  while(obj.parent && obj.parent!==piecesGroup) obj=obj.parent;
  if(!obj.userData || !obj.userData.key) return;
  pieces.delete(obj.userData.key);
  if(obj.userData.lightRef){
    const i=placedLights.indexOf(obj.userData.lightRef);
    if(i>=0) placedLights.splice(i,1);
  }
  for(let i=doors.length-1;i>=0;i--) if(doors[i].mesh===obj) doors.splice(i,1);
  for(let i=chimneys.length-1;i>=0;i--) if(chimneys[i]===obj) chimneys.splice(i,1);
  for(let i=spinners.length-1;i>=0;i--) if(spinners[i].root===obj) spinners.splice(i,1);
  for(let i=fountains.length-1;i>=0;i--) if(fountains[i]===obj) fountains.splice(i,1);
  piecesGroup.remove(obj);
  pieceCount--; updateCovered(); updateCounter();
  dustAt(obj.position.x, obj.position.y+.4, obj.position.z);
  sfx.remove();
  vrPulse(0.4, 30);
  saveSoon();
}
function removeAt(ndc){
  ray.setFromCamera(ndc, camera);
  removeWithRaycaster();
}

const puffs=[];
function dustAt(x,y,z,o){
  o=o||{};
  const count=o.count||12, color=o.color||0xe6d2ae, size=o.size||.14;
  const life=o.life||.7, o0=(o.o0!=null)?o.o0:.9, grav=(o.grav!=null)?o.grav:3.5;
  const vy=o.vy||[.6,2.4], lat=(o.lat!=null)?o.lat:1.6, spread=(o.spread!=null)?o.spread:.8;
  const pos=new Float32Array(count*3), vel=[];
  for(let i=0;i<count;i++){
    pos[i*3]=x+(Math.random()-.5)*spread;
    pos[i*3+1]=y+Math.random()*.3;
    pos[i*3+2]=z+(Math.random()-.5)*spread;
    vel.push([(Math.random()-.5)*lat, vy[0]+Math.random()*(vy[1]-vy[0]), (Math.random()-.5)*lat]);
  }
  const g=new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(pos,3));
  const m=new THREE.PointsMaterial({color:color,
    size:size*(renderer.xr.isPresenting?WORLD_SC:1),
    transparent:true, opacity:o0, depthWrite:false});
  const pts=new THREE.Points(g,m); world.add(pts);
  puffs.push({pts:pts, vel:vel, t:0, life:life, o0:o0, grav:grav});
}

   SONIDO (martillazos de carpintero, síntesis WebAudio)
   ===================================================================== */
const sfx=(function(){
  let ctx=null, combo=0, lastT=0;
  function ac(){ if(!ctx){ try{ ctx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} }
    if(ctx && ctx.state==='suspended') ctx.resume();
    return ctx; }
  function knock(freq, dur, vol, type){
    const a=ac(); if(!a) return;
    const t=a.currentTime;
    const o=a.createOscillator(), g=a.createGain();
    o.type=type||'triangle';
    o.frequency.setValueAtTime(freq, t);
    o.frequency.exponentialRampToValueAtTime(Math.max(40,freq*.45), t+dur);
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(.001, t+dur);
    o.connect(g).connect(a.destination);
    o.start(t); o.stop(t+dur+.02);
    // golpe seco (ruido corto)
    const len=a.sampleRate*.05, buf=a.createBuffer(1,len,a.sampleRate), d=buf.getChannelData(0);
    for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,2);
    const s=a.createBufferSource(), g2=a.createGain();
    s.buffer=buf; g2.gain.value=vol*.5;
    s.connect(g2).connect(a.destination); s.start(t);
  }
  return {
    place(){ const now=performance.now();
      combo = (now-lastT<1600) ? Math.min(combo+1,8) : 0; lastT=now;
      knock(170*(1+combo*.07), .14, .5); },
    remove(){ knock(95, .2, .4, 'sine'); combo=0; },
    deny(){ knock(70, .12, .25, 'square'); },
    unlock(){ knock(240,.16,.4); setTimeout(()=>knock(320,.16,.42),110); setTimeout(()=>knock(430,.22,.45),220); },
    paint(){ knock(300,.07,.2); setTimeout(()=>knock(380,.06,.16),70); },
    coin(){ knock(620,.06,.18); setTimeout(()=>knock(840,.07,.15),60); },
    levelup(){ [200,260,330,420,560].forEach((f,i)=>setTimeout(()=>knock(f,.18,.4),i*95)); },
    expand(){ knock(60,.5,.55,'sine'); setTimeout(()=>knock(80,.4,.4,'sine'),180); setTimeout(()=>knock(110,.35,.3,'sine'),360); },
    thunder(){ knock(45,.9,.5,'sine'); setTimeout(()=>knock(70,.6,.35,'sine'),120); },
    tick(){ knock(420, .05, .12); },
  };
})();

  const m=MISSIONS[missionIdx];

  if(!birdState.active || missionIdx>=MISSIONS.length){ renderMission(); return; }
  const m=MISSIONS[missionIdx];

    gold+=m.g;
    gainXP(Math.round(m.g*.6));

const birdState={active:false, mode:'perch', t:0, wait:5,
  from:new THREE.Vector3(), to:new THREE.Vector3(), dur:1};
function birdPerchTarget(){
  const arr=[];
  pieces.forEach(function(m){ arr.push(m); });
  if(arr.length && Math.random()<.8){
    const m=arr[Math.floor(Math.random()*arr.length)];
    const d=DEFS[m.userData.varId]||{};
    let top=1.0;
    if(d.prefix==='R') top=(d.id==='t_pla')?.3:1.15;
    else if(d.prefix==='F') top=.15;
    else if(d.kind==='edge') top=WH+.06;
    else if(d.prefix==='S') top=WH+.05;
    else if(d.prefix==='C') top=1.55;
    return new THREE.Vector3(m.position.x+(Math.random()-.5)*.5, m.position.y+top, m.position.z+(Math.random()-.5)*.5);
  }
  return new THREE.Vector3(10.6,2.45,7.2);  // el farolillo del claro
}
function updateBird(dt){
  if(!birdState.active){
    if(totalPlaced>=6){
      birdState.active=true; bird.visible=true;
      bird.position.set(10.6,2.45,7.2);
      toast('🐦 Un <b>petirrojo</b> se ha mudado a tu claro · te traerá misiones');
      setTimeout(renderMission, 2200);
    }
    return;
  }
  const b=birdState;
  if(b.mode==='perch'){
    b.t+=dt;
    birdBody.position.y=Math.abs(Math.sin(T*2.1))*.012;
    wingL.rotation.z=.1; wingR.rotation.z=-.1;
    if(b.t>b.wait){
      b.mode='fly'; b.t=0;
      b.from.copy(bird.position);
      b.to.copy(birdPerchTarget());
      b.dur=Math.max(1.1, b.from.distanceTo(b.to)*.18);
    }
  } else {
    b.t+=dt/b.dur;
    const tt=Math.min(1,b.t), e=tt*tt*(3-2*tt);
    bird.position.lerpVectors(b.from, b.to, e);
    bird.position.y += Math.sin(tt*Math.PI)*2.2;
    const f=Math.sin(T*22)*.85;
    wingL.rotation.z=.2+f; wingR.rotation.z=-.2-f;
    bird.rotation.y=Math.atan2(b.to.x-b.from.x, b.to.z-b.from.z);
    if(tt>=1){ b.mode='perch'; b.t=0; b.wait=5+Math.random()*9; bird.rotation.y=Math.random()*Math.PI*2; }
  }
}

function applyCamera(dt){
  const target = charState.pos.clone().add(new THREE.Vector3(0,1.25,0));
  const cp=Math.cos(cam.pitch), sp=Math.sin(cam.pitch);
  const off=new THREE.Vector3(Math.sin(cam.yaw)*cp, sp, Math.cos(cam.yaw)*cp).multiplyScalar(cam.dist);
  const want=target.clone().add(off);
  camera.position.lerp(want, Math.min(1, dt*7));

}

const downRay = new THREE.Raycaster();
const DOWN = new THREE.Vector3(0,-1,0);
const _gO=new THREE.Vector3(), _gP=new THREE.Vector3();
function groundHeightAt(x, z, fromY){
  _gO.set(x, fromY, z); world.localToWorld(_gO);     // a coords de escena
  downRay.set(_gO, DOWN);
  downRay.far = 8 * world.scale.x;
  const hits = downRay.intersectObjects(walkables.concat(piecesGroup.children), false);
  if(!hits.length) return null;
  _gP.copy(hits[0].point); world.worldToLocal(_gP);  // de vuelta al diorama
  return _gP.y;
}
function wallBlocks(x, z, y){
  for(const mesh of pieces.values()){
    const def=DEFS[mesh.userData.varId];
    if(!def || def.kind!=='edge' || !def.solid) continue;
    const lv=Math.round(mesh.position.y/WH);
    if(y < lv*WH-0.4 || y > lv*WH+1.9) continue;
    const wx=mesh.position.x, wz=mesh.position.z;
    const axis = (Math.abs(Math.abs(mesh.rotation.y)%Math.PI - Math.PI/2)<.1) ? 1 : 0;
    let along, across;
    if(axis===0){ along=Math.abs(x-wx); across=Math.abs(z-wz); }
    else        { along=Math.abs(z-wz); across=Math.abs(x-wx); }
    if(across<0.26 && along<C/2+0.05){
      if(def.door && along<(def.pass||0.4)) continue;   // hueco de la puerta
      return true;
    }
  }
  return false;
}
function moveChar(dt){
  let dx=0,dz=0;
  if(keys.KeyW||keys.ArrowUp)dz-=1; if(keys.KeyS||keys.ArrowDown)dz+=1;
  if(keys.KeyA||keys.ArrowLeft)dx-=1; if(keys.KeyD||keys.ArrowRight)dx+=1;
  let movingInput = (dx||dz);
  let wx=0, wz=0;
  if(movingInput){
    const len=Math.hypot(dx,dz); dx/=len; dz/=len;
    const s=Math.sin(cam.yaw), c=Math.cos(cam.yaw);
    wx =  dx*c + dz*s;
    wz = -dx*s + dz*c;
  } else if(vrMoveTarget){
    const tx=vrMoveTarget.x-charState.pos.x, tz=vrMoveTarget.z-charState.pos.z;
    const d=Math.hypot(tx,tz);
    if(d<0.28){ vrMoveTarget=null; }
    else { wx=tx/d; wz=tz/d; movingInput=true; }
  }
  charState.moving=false;
  if(movingInput){
    const speed=4.4;
    const tryMove=(nx,nz)=>{
      if(Math.hypot(nx,nz) > walkR) return false;
      if(wallBlocks(nx,nz,charState.pos.y)) return false;
      const gy=groundHeightAt(nx,nz, charState.pos.y+0.9);
      if(gy===null) return false;
      if(gy - charState.pos.y > 0.62) return false;
      charState.pos.x=nx; charState.pos.z=nz;
      return true;
    };
    const nx=charState.pos.x+wx*speed*dt, nz=charState.pos.z+wz*speed*dt;
    if(!tryMove(nx,nz)){
      if(!tryMove(nx, charState.pos.z)) tryMove(charState.pos.x, nz);
    }
    charState.moving=true;
    const wantYaw=Math.atan2(wx,wz);
    let d=wantYaw-charState.yaw;
    while(d>Math.PI)d-=Math.PI*2; while(d<-Math.PI)d+=Math.PI*2;
    charState.yaw+=d*Math.min(1, dt*11);
  }
  // altura del suelo (subir escaleras / caer)
  const gy=groundHeightAt(charState.pos.x, charState.pos.z, charState.pos.y+0.9);
  if(gy!==null){
    const k = gy>charState.pos.y ? 18 : 10;
    charState.pos.y += (gy-charState.pos.y)*Math.min(1, dt*k);
  }
  char.position.copy(charState.pos);
  char.rotation.y=charState.yaw;
}

function curCatIdx(){ return selected? CATS.findIndex(function(c){return c.id===selected.cat;}) : -1; }

function selectCategory(i){
  if(i===null){ selected=null; ghost.visible=false; renderBuildUI(); sfx.tick();
    toast('Modo paseo · muévete con <b>WASD</b>'); return; }
  const c=CATS[i];
  if(curCatIdx()===i){ cycleVariant(1); return; }   // repetir tecla = siguiente variante
  let vi=catVarIdx[c.id];
  if(!isUnlockedDef(c.vars[vi])) vi=c.vars.findIndex(isUnlockedDef);
  if(vi<0){ toast('Aún no has desbloqueado nada de <b>'+c.name+'</b>'); return; }
  catVarIdx[c.id]=vi;
  selected=c.vars[vi];
  renderBuildUI(); sfx.tick();
  toast('<b>'+c.name+' '+selected.name.toLowerCase()+'</b> · rueda para girar · Q/E material');
}
function selChanged(){
  if(typeof vrHudMark==='function') vrHudMark();
  menuDirty=true;
}
function cycleVariant(d){
  if(!selected) return;
  const c=CATS[curCatIdx()], n=c.vars.length;
  let vi=catVarIdx[c.id];
  for(let k=0;k<n;k++){
    vi=(vi+d+n)%n;
    if(isUnlockedDef(c.vars[vi])) break;
  }
  catVarIdx[c.id]=vi; selected=c.vars[vi];
  renderBuildUI(); sfx.tick(); selChanged();
  if(typeof drawLabel==='function') drawLabel();
  toast('<b>'+selected.name+'</b>');
}
function cyclePaint(d){
  selPaint=(selPaint+d+PAINTS.length)%PAINTS.length;
  renderBuildUI(); sfx.tick();
  if(typeof drawLabel==='function') drawLabel();
  toast('Pintura: <b>'+PAINTS[selPaint].name+'</b>');
}
function cycleMaterial(d){
  const n=MATERIALS.length;
  let i=selMat;
  for(let k=0;k<n;k++){
    i=(i+d+n)%n;
    if(isUnlockedMat(MATERIALS[i])) break;
  }
  if(i!==selMat){ selMat=i; renderBuildUI(); sfx.tick();
    if(typeof drawLabel==='function') drawLabel();
    toast('Material: <b>'+MATERIALS[i].name+'</b>'); }
}
function hx(c){ return '#'+('00000'+c.toString(16)).slice(-6); }

function renderBuildUI(){
  catBtns.forEach(function(b,i){ b.classList.toggle('sel', curCatIdx()===i); });
  handBtn.classList.toggle('sel', !selected);
  menuDirty=true;
  if(typeof drawLabel==='function') drawLabel();
  // variantes
  variantBar.innerHTML=''; matBar.innerHTML='';
  variantBar.style.display = selected? 'flex':'none';
  matBar.style.display = selected? 'flex':'none';
  if(!selected){ updateCounter(); return; }
  const c=CATS[curCatIdx()];
  c.vars.forEach(function(v,vi){
    const pill=document.createElement('span');
    const lk=!isUnlockedDef(v);
    pill.className='pill'+(v===selected?' sel':'')+(lk?' lk':'');
    pill.innerHTML = lk ? '🔒 '+v.name+' <i>Nv '+v.at+'</i>' : v.name;
    pill.addEventListener('click', function(){
      if(lk){ toast('🔒 Se desbloquea al <b>nivel '+v.at+'</b>'); sfx.deny(); return; }
      catVarIdx[c.id]=vi; selected=v; renderBuildUI(); sfx.tick();
    });
    variantBar.appendChild(pill);
  });
  // pinturas (si la herramienta activa es Pintura) o materiales
  if(selected.tool==='paint'){
    PAINTS.forEach(function(pt,pi){
      const sw=document.createElement('span');
      sw.className='swatch'+(pi===selPaint?' sel':'');
      if(pt.c==null){ sw.style.setProperty('--c1','#5a4a38'); sw.style.setProperty('--c2','#8a6f50');
        sw.innerHTML='<span class="mini">⊘</span>'; }
      else { sw.style.setProperty('--c1', hx(pt.c)); sw.style.setProperty('--c2', hx(pt.c)); }
      sw.title=pt.name;
      sw.addEventListener('click', function(){
        selPaint=pi; renderBuildUI(); sfx.tick();
        toast('Pintura: <b>'+pt.name+'</b> · haz clic en una pieza');
      });
      matBar.appendChild(sw);
    });
  } else if(selected.tool){
    matBar.style.display='none';
  } else {
    MATERIALS.forEach(function(m,mi){
      const sw=document.createElement('span');
      const lk=!isUnlockedMat(m);
      sw.className='swatch'+(mi===selMat?' sel':'')+(lk?' lk':'');
      sw.style.setProperty('--c1', hx(m.B));
      sw.style.setProperty('--c2', hx(m.A));
      sw.title=m.name+(lk?(' · Nv '+m.at):'');
      if(lk) sw.innerHTML='<span class="mini">🔒</span>';
      sw.addEventListener('click', function(){
        if(lk){ toast('🔒 <b>'+m.name+'</b> llega al <b>nivel '+m.at+'</b>'); sfx.deny(); return; }
        selMat=mi; renderBuildUI(); sfx.tick();
        toast('Material: <b>'+m.name+'</b>');
      });
      matBar.appendChild(sw);
    });
  }
  updateCounter();
}

const clock=new THREE.Clock();
let T=0, smokeT=0, fountT=0;
let windK=1;
function easeOutBack(t){ const c=1.70158; return 1 + (c+1)*Math.pow(t-1,3) + c*Math.pow(t-1,2); }

let lastErr='';
function reportErr(where, e){
  if(!lastErr) console.error(where, e);
  lastErr=where+': '+((e && e.message)? e.message : String(e));
  const eb=document.getElementById('errBar');
  eb.textContent='⚠ '+lastErr; eb.classList.add('show');
  hudDirty=true;
}
function frame(){
  try{ frameInner(); }
  catch(e){
    reportErr('bucle', e);
    try{ renderer.render(scene, camera); }
    catch(e2){ reportErr('render', e2); }
  }
}
function frameInner(){
  const dt=Math.min(clock.getDelta(), .05);
  T+=dt;

  moveChar(dt);
  if(renderer.xr.isPresenting) vrUpdate(dt); else applyCamera(dt);
  updateGhost();

  // animación del personaje
  const w=charState.moving?1:0;
  bodyG.position.y = Math.abs(Math.sin(T*(w?9:2)))*(w?.06:.015);
  armL.rotation.x =  Math.sin(T*9)*.7*w;
  armR.rotation.x = -Math.sin(T*9)*.7*w;
  hoodM.rotation.x = Math.sin(T*9)*.06*w;
  bodyG.rotation.x = w*0.06;

  // rejilla visible en modo construcción
  const wantOp = selected ? .3 : 0;
  grid.material.opacity += (wantOp-grid.material.opacity)*Math.min(1,dt*6);

  // pop al colocar
  for(let i=anims.length-1;i>=0;i--){
    const a=anims[i]; a.t+=dt*4.2;
    if(a.t>=1){ a.mesh.scale.set(1,1,1); anims.splice(i,1); }
    else { const s=.6+.4*easeOutBack(a.t); a.mesh.scale.set(s,s,s); }
  }
  // polvo / humo / chispas
  for(let i=puffs.length-1;i>=0;i--){
    const p=puffs[i]; p.t+=dt;
    const arr=p.pts.geometry.attributes.position;
    for(let j=0;j<p.vel.length;j++){
      arr.setX(j, arr.getX(j)+p.vel[j][0]*dt);
      arr.setY(j, arr.getY(j)+p.vel[j][1]*dt);
      arr.setZ(j, arr.getZ(j)+p.vel[j][2]*dt);
      p.vel[j][1]-=p.grav*dt;
    }
    arr.needsUpdate=true;
    p.pts.material.opacity=Math.max(0, p.o0*(1-p.t/p.life));
    if(p.t>p.life){ world.remove(p.pts); p.pts.geometry.dispose(); p.pts.material.dispose(); puffs.splice(i,1); }
  }
  // puertas que se abren solas al acercarse el gnomo
  for(let i=doors.length-1;i>=0;i--){
    const d=doors[i];
    if(!d.mesh.parent){ doors.splice(i,1); continue; }
    const ddx=charState.pos.x-d.mesh.position.x, ddz=charState.pos.z-d.mesh.position.z;
    const near = Math.hypot(ddx,ddz)<1.5 && Math.abs(charState.pos.y-d.mesh.position.y)<1.6;
    const want = near ? -1.5 : -0.06;
    if(near && !d.wasNear){ sfx.tick(); }
    d.wasNear=near;
    const spd = d.slow ? 3 : 6;
    d.leaf.rotation.y += (want-d.leaf.rotation.y)*Math.min(1, dt*spd);
    if(d.leaf2) d.leaf2.rotation.y += ((-want)-d.leaf2.rotation.y)*Math.min(1, dt*spd);
  }
  // humo perezoso de las chimeneas
  smokeT+=dt;
  if(smokeT>0.55){
    smokeT=0;
    for(const ch of chimneys){
      if(puffs.length>14) break;
      if(Math.random()<.8)
        dustAt(ch.position.x+(Math.random()-.5)*.1, ch.position.y+1.8, ch.position.z,
          {count:1, color:0xb9b4ae, size:.27, life:2.6, o0:.45, grav:-0.18, vy:[.45,.7], lat:.16, spread:.2});
    }
  }
  updateSky(dt);
  if(renderer.xr.isPresenting){
    // posición real de la cabeza
    const xrCam=renderer.xr.getCamera(camera);
    headPos.setFromMatrixPosition(xrCam.matrixWorld);
    if(placeTable && headPos.lengthSq()>0.01){
      placeTable=false;
      headFwd.set(-xrCam.matrixWorld.elements[8], 0, -xrCam.matrixWorld.elements[10]);
      if(headFwd.lengthSq()<0.01) headFwd.set(0,0,-1);
      headFwd.normalize();
      world.position.copy(headPos).addScaledVector(headFwd, 1.05);
      world.position.y = headPos.y - 0.55;     // mesa 55 cm bajo tus ojos
    }
    grabUpdate();
    // los paneles acompañan a la mesa y te miran
    if(headPos.lengthSq()>0.01){
      headFwd.subVectors(headPos, world.position); headFwd.y=0;
      if(headFwd.lengthSq()>0.01){
        headFwd.normalize();
        const rx=headFwd.z, rz=-headFwd.x;
        hudPanel.position.set(
          world.position.x + rx*0.78 + headFwd.x*0.2,
          world.position.y + 0.34,
          world.position.z + rz*0.78 + headFwd.z*0.2);
        hudPanel.lookAt(headPos);
        buildMenu.position.set(
          world.position.x - rx*0.78 + headFwd.x*0.2,
          world.position.y + 0.32,
          world.position.z - rz*0.78 + headFwd.z*0.2);
        buildMenu.lookAt(headPos);
      }
    }
    // hover del láser sobre el menú
    menuHover=false; menuCursor.visible=false;
    if(ctrlR && buildMenu.visible){
      setRayFromController(ctrlR);
      const mh=ray.intersectObject(buildMenu, false);
      if(mh.length){
        menuHover=true;
        menuCursor.visible=true;
        menuCursor.position.copy(mh[0].point);
      }
    }
    hudCool-=dt;
    if(hudDirty && hudCool<=0){ drawVrHud(); hudDirty=false; hudCool=.35; }
    if(menuDirty){ drawBuildMenu(); menuDirty=false; }
  }
  // crecimiento del terreno
  if(growAnim){
    growAnim.t+=dt/1.6;
    const tt=Math.min(1,growAnim.t);
    const e=1-Math.pow(1-tt,3);
    const k=growAnim.from+(growAnim.to-growAnim.from)*e;
    ground.scale.set(k,k,k);
    lantern.position.set(10.6*k, 2.05*k, 7.2*k);
    if(tt>=1) growAnim=null;
  }
  // petirrojo
  updateBird(dt);
  // ingenios en marcha (el viento del clima los acelera)
  for(const sp of spinners){
    if(sp.mode==='spin'){
      sp.m.rotation[sp.axis] += sp.spd * dt * (sp.wind? windK : 1) * 1.6;
    } else {
      sp.m.position.y = sp.base + Math.sin(T*sp.spd+sp.ph)*sp.amp;
    }
  }
  // agua de las fuentes
  fountT+=dt;
  if(fountT>0.13){
    fountT=0;
    for(const f of fountains){
      if(puffs.length>16) break;
      dustAt(f.position.x, f.position.y+1.06, f.position.z,
        {count:2, color:0x9fc8de, size:.07, life:.85, o0:.8, grav:5.2, vy:[2.0,2.9], lat:.55, spread:.1});
    }
  }
  // farolillos colocados: llama viva
  for(const L of placedLights){
    L.intensity = L.userData.base*(1 + Math.sin(T*6.4+L.userData.ph)*.09 + Math.sin(T*11.3+L.userData.ph)*.05);
  }
  // luciérnagas (evitan los espacios techados)
  {
    const arr=fireflies.geometry.attributes.position, seed=fireflies.userData.seed;
    for(let i=0;i<seed.length;i++){
      arr.setY(i, arr.getY(i)+Math.sin(T*1.3+seed[i])*.0035);
      arr.setX(i, arr.getX(i)+Math.cos(T*.7+seed[i]*2)*.003);
      if(coveredCells.size){
        const cell=Math.round(arr.getX(i)/C)+':'+Math.round(arr.getZ(i)/C);
        if(coveredCells.has(cell) && arr.getY(i)<WH*4){
          const a=Math.random()*Math.PI*2, r=10.5+Math.random()*4.5;
          arr.setX(i, Math.cos(a)*r); arr.setZ(i, Math.sin(a)*r);
          arr.setY(i, .4+Math.random()*3.4);
        }
      }
    }
    arr.needsUpdate=true;
    fireflies.material.opacity=(.55+Math.sin(T*2.2)*.3)*Math.max(0,1-rainOp);
    const m2=motes.geometry.attributes.position, s2=motes.userData.seed;
    for(let i=0;i<s2.length;i++){
      m2.setY(i, m2.getY(i)+Math.sin(T*.5+s2[i])*.002);
    }
    m2.needsUpdate=true;
  }
  // farolillo parpadeante
  lantern.intensity = 1.25 + Math.sin(T*7.3)*.09 + Math.sin(T*13.1)*.06;

  renderer.render(scene, camera);
}

/* =====================================================================
   VR · MODO MESA (WebXR — Pico 4, Quest, PCVR)
   El MUNDO se escala a 1/16 y se coloca como un teatrillo de ~2 m sobre
   una mesa frente a ti. Mando derecho: construir (A=variante, B=material).
   Mando izquierdo: stick gira/acerca la mesa, gatillo mueve al gnomo.
   ===================================================================== */
renderer.xr.enabled = true;
renderer.xr.setReferenceSpaceType('local-floor');
const WORLD_SC = 1/16;             // escala maqueta
let usingLocalSpace=false;         // respaldo si el visor no da 'local-floor'
const tmpMat = new THREE.Matrix4();
const headPos=new THREE.Vector3(), headFwd=new THREE.Vector3();
let ctrlR=null, ctrlL=null, vrMoveTarget=null;

function setRayFromController(c){
  tmpMat.identity().extractRotation(c.matrixWorld);
  ray.ray.origin.setFromMatrixPosition(c.matrixWorld);
  ray.ray.direction.set(0,0,-1).applyMatrix4(tmpMat).normalize();
}
function vrPulse(intensity, ms){
  try{
    const src=ctrlR&&ctrlR.userData.source, gp=src&&src.gamepad;
    const h=gp&&gp.hapticActuators&&gp.hapticActuators[0];
    if(h&&h.pulse) h.pulse(intensity, ms);

/* colocar el diorama como una mesa frente al jugador */
/* --- agarre del mundo estilo Demeo --- */
let placeTable=false;
const grab={n:0, c1:null, c2:null,
  wp0:new THREE.Vector3(), h0:new THREE.Vector3(),
  d0:1, a0:0, S0:1, Y0:0, pivot:new THREE.Vector3(),
  _p1:new THREE.Vector3(), _p2:new THREE.Vector3(), _m:new THREE.Vector3(), _v:new THREE.Vector3()};
function ctrlPos(c,out){ return out.setFromMatrixPosition(c.matrixWorld); }
function grabStartSingle(c){
  grab.c1=c; grab.n=1;
  grab.wp0.copy(world.position);
  ctrlPos(c, grab.h0);
}
function grabStartDouble(){
  ctrlPos(grab.c1, grab._p1); ctrlPos(grab.c2, grab._p2);
  grab._m.addVectors(grab._p1, grab._p2).multiplyScalar(.5);
  grab.d0=Math.max(.06, grab._p1.distanceTo(grab._p2));
  grab.a0=Math.atan2(grab._p2.x-grab._p1.x, grab._p2.z-grab._p1.z);
  grab.S0=world.scale.x; grab.Y0=world.rotation.y;
  world.updateMatrixWorld();
  grab.pivot.copy(grab._m); world.worldToLocal(grab.pivot);
}
function grabUpdate(){
  if(grab.n===1){
    ctrlPos(grab.c1, grab._p1);
    world.position.copy(grab.wp0).add(grab._p1).sub(grab.h0);
  } else if(grab.n===2){
    ctrlPos(grab.c1, grab._p1); ctrlPos(grab.c2, grab._p2);
    grab._m.addVectors(grab._p1, grab._p2).multiplyScalar(.5);
    const d1=Math.max(.06, grab._p1.distanceTo(grab._p2));
    const a1=Math.atan2(grab._p2.x-grab._p1.x, grab._p2.z-grab._p1.z);
    const sc=Math.min(1/6, Math.max(1/40, grab.S0*(d1/grab.d0)));
    const yaw=grab.Y0+(a1-grab.a0);
    world.scale.setScalar(sc);
    world.rotation.y=yaw;
    grab._v.copy(grab.pivot).multiplyScalar(sc)
      .applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
    world.position.copy(grab._m).sub(grab._v);
  }
}
function grabSqueezeStart(c){
  if(grab.n===0){ grabStartSingle(c); }
  else if(grab.n===1 && c!==grab.c1){ grab.c2=c; grab.n=2; grabStartDouble(); }
}
function grabSqueezeEnd(c){
  if(grab.n===2 && (c===grab.c1 || c===grab.c2)){
    const rest=(c===grab.c1)? grab.c2 : grab.c1;
    grab.n=0; grabStartSingle(rest);
  } else if(grab.n===1 && c===grab.c1){
    grab.n=0; grab.c1=null;
  }
}

/* lectura de sticks y botones cada frame */
function vrUpdate(dt){
  for(const c of controllers){
    const src=c.userData.source; if(!src||!src.gamepad) continue;
    const gp=src.gamepad, ax=gp.axes||[];
    const sx=ax[2]||0, sy=ax[3]||0, ud=c.userData;
    if(c===ctrlR){
      if(sx> .6 && !(ud.fx> .6)){ rotIndex=(rotIndex+1)%4; sfx.tick(); vrPulse(.2,15); }
      if(sx<-.6 && !(ud.fx<-.6)){ rotIndex=(rotIndex+3)%4; sfx.tick(); vrPulse(.2,15); }
      if(sy<-.6 && !(ud.fy<-.6)) cycleTool(1);
      if(sy> .6 && !(ud.fy> .6)) cycleTool(-1);
      ud.fx=sx; ud.fy=sy;
      // clic del stick derecho = quitar la pieza apuntada
      const b3=!!(gp.buttons[3]&&gp.buttons[3].pressed);
      if(b3&&!ud.b3){ setRayFromController(c); removeWithRaycaster(); }
      ud.b3=b3;
      // A = variante · B = material
      const a4=!!(gp.buttons[4]&&gp.buttons[4].pressed);
      const a5=!!(gp.buttons[5]&&gp.buttons[5].pressed);
      if(a4&&!ud.a4) cycleVariant(1);
      if(a5&&!ud.a5){ if(selected && selected.tool==='paint') cyclePaint(1); else cycleMaterial(1); }
      ud.a4=a4; ud.a5=a5;
    } else {
      if(grab.n===0){
        if(Math.abs(sx)>.15) world.rotation.y -= sx*dt*1.6;
        if(Math.abs(sy)>.15 && headPos.lengthSq()>0.01){
          grab._v.subVectors(headPos, world.position); grab._v.y=0;
          if(grab._v.lengthSq()>0.01){
            grab._v.normalize();
            world.position.addScaledVector(grab._v, -sy*dt*0.7);
          }
        }
      }
      if(gp.buttons[0] && gp.buttons[0].pressed){
        setRayFromController(c);
        const hits=ray.intersectObjects(walkables.concat(piecesGroup.children), false);
        if(hits.length){ vrMoveTarget=hits[0].point.clone(); world.worldToLocal(vrMoveTarget); }
      }
      const b4=!!(gp.buttons[4]&&gp.buttons[4].pressed);
      const b5=!!(gp.buttons[5]&&gp.buttons[5].pressed);
      if(b4&&!ud.b4) stepLight(-0.12);
      if(b5&&!ud.b5) stepLight( 0.12);
      ud.b4=b4; ud.b5=b5;
      // clic del stick izquierdo ×2 = comprar ampliación de terreno
      const lb3=!!(gp.buttons[3]&&gp.buttons[3].pressed);
      if(lb3&&!ud.lb3){
        const ex=EXPANSIONS[expansions];
        if(ex){
          const now=performance.now();
          if(ud.exArm && now-ud.exArm<4000){ ud.exArm=0; buyExpansion(expansions); }
          else if(level>=ex.lvl && gold>=ex.cost){
            ud.exArm=now;
            toast('🌍 ¿Ampliar por <b>'+ex.cost+'</b> 🪙? Repite el clic');
          } else {
            buyExpansion(expansions);   // dará el motivo (nivel u oro)
          }
        }
      }
      ud.lb3=lb3;
    }
  }
}

document.body.appendChild(vrBtn);
let xrReady=false;
function checkXR(){
  if(!window.isSecureContext){ vrBtn.classList.add('off'); return; }
  if(!(navigator.xr && navigator.xr.isSessionSupported)){ vrBtn.classList.add('off'); return; }
  navigator.xr.isSessionSupported('immersive-vr').then(function(ok){
    xrReady=ok;
    vrBtn.classList.toggle('off', !ok);
    if(ok) vrBtn.textContent='Entrar en VR 🥽 ✓';
  }).catch(function(){ vrBtn.classList.add('off'); });
}
checkXR();
vrBtn.addEventListener('click', function(){
  if(!window.isSecureContext){
    toast('VR necesita <b>HTTPS</b> · sube el archivo a un hosting y ábrelo ahí'); return;
  }
  if(!navigator.xr){
    toast('Este navegador no tiene WebXR · ábrelo en el <b>Pico Browser</b> de tu visor'); return;
  }
  if(!xrReady){
    toast('No se detecta visor VR aquí · abre esta página en el <b>Pico Browser</b>'); return;
  }
  usingLocalSpace=false;
  renderer.xr.setReferenceSpaceType('local-floor');
  navigator.xr.requestSession('immersive-vr',
      {requiredFeatures:['local-floor'], optionalFeatures:['bounded-floor','hand-tracking']})
    .catch(function(){
      usingLocalSpace=true;
      renderer.xr.setReferenceSpaceType('local');
      return navigator.xr.requestSession('immersive-vr', {optionalFeatures:['hand-tracking']});
    })
    .then(function(session){
      renderer.xr.setSession(session);
      document.getElementById('verTag').textContent=GAME_VERSION+(usingLocalSpace?' · L':' · LF');
      // vigilante: si en 2,5 s no se presenta ni un fotograma, repórtalo
      setTimeout(function(){
        if(!renderer.xr.isPresenting)
          reportErr('xr', 'sesión activa pero sin presentar (espacio de referencia)');
      }, 2500);
    })
    .catch(function(err){ toast('No se pudo iniciar la sesión VR'); reportErr('requestSession', err); });
});

const lightSliderEl=document.getElementById('lightSlider');
const lightSlider=lightSliderEl;
lightSlider.addEventListener('input', ()=>{ applyLight(lightSlider.value/100); saveSoon(); });
applyLight(lightSlider.value/100);


/* =====================================================================
   GUARDADO · IndexedDB ('claro-db')
   Nota: dentro de la vista previa de Claude el almacenamiento puede estar
   bloqueado; alojado (Netlify, etc.) funciona y la partida persiste.
   ===================================================================== */
let dbProm=null, saveTimer=null, idbOK=('indexedDB' in window);
function db(){
  if(!idbOK) return Promise.reject();
  if(!dbProm) dbProm=new Promise(function(res,rej){
    try{
      const r=indexedDB.open('claro-db',1);
      r.onupgradeneeded=function(){ r.result.createObjectStore('save'); };
      r.onsuccess=function(){ res(r.result); };
      r.onerror=function(){ idbOK=false; rej(); };
    }catch(e){ idbOK=false; rej(); }
  });
  return dbProm;
}
function gatherSave(){
  const arr=[];
  pieces.forEach(function(m){
    arr.push({k:m.userData.key, v:m.userData.varId, mt:m.userData.matId,
      x:+m.position.x.toFixed(3), y:+m.position.y.toFixed(3), z:+m.position.z.toFixed(3),
      r:+m.rotation.y.toFixed(4), t:(m.userData.tint!=null?m.userData.tint:null),
      f:m.userData.finish||null});
  });
  return {ver:1, tp:totalPlaced, xp:xp, lv:level, gd:gold, ex:expansions,
    sm:selMat, mi:missionIdx, pc:paintedCount,
    fu:Array.from(firstUse), pieces:arr,
    cx:+charState.pos.x.toFixed(2), cy:+charState.pos.y.toFixed(2), cz:+charState.pos.z.toFixed(2),
    light:lightSliderEl.value};
}
function saveNow(){
  if(!idbOK) return;
  const data=gatherSave();
  db().then(function(d){
    try{ d.transaction('save','readwrite').objectStore('save').put(data,'main'); }catch(e){}
  }).catch(function(){});
}
function saveSoon(){ clearTimeout(saveTimer); saveTimer=setTimeout(saveNow, 1600); }
function loadSave(){
  return db().then(function(d){
    return new Promise(function(res){
      try{
        const rq=d.transaction('save').objectStore('save').get('main');
        rq.onsuccess=function(){ res(rq.result||null); };
        rq.onerror=function(){ res(null); };
      }catch(e){ res(null); }
    });
  }).catch(function(){ return null; });
}
function wipeSave(){
  db().then(function(d){
    try{
      const rq=d.transaction('save','readwrite').objectStore('save').delete('main');
      rq.onsuccess=function(){ location.reload(); };
    }catch(e){ location.reload(); }
  }).catch(function(){ location.reload(); });
}
function restoreSave(d){
  totalPlaced=d.tp||0; xp=d.xp||0; level=d.lv||1; gold=d.gd||0;
  selMat=Math.min(d.sm||0, MATERIALS.length-1);
  missionIdx=d.mi||0; paintedCount=d.pc||0;
  (d.fu||[]).forEach(function(id){ firstUse.add(id); });
  UNLOCKS.forEach(function(u){ if(u.at<=level) announced.add(u.at+u.name); });
  // expansiones (sin animación)
  const exN=Math.min(d.ex||0, EXPANSIONS.length);
  if(exN>0){
    const ex=EXPANSIONS[exN-1];
    expansions=exN; buildR=ex.buildR; walkR=PLATEAU_R*ex.k-0.9;
    SHADOW_R=20+exN*4;
    sun.shadow.camera.left=-SHADOW_R; sun.shadow.camera.right=SHADOW_R;
    sun.shadow.camera.top=SHADOW_R; sun.shadow.camera.bottom=-SHADOW_R;
    sun.shadow.camera.updateProjectionMatrix();
    ground.scale.set(ex.k,ex.k,ex.k);
    lantern.position.set(10.6*ex.k, 2.05*ex.k, 7.2*ex.k);
    world.remove(grid);
    grid=new THREE.GridHelper(ex.grid, ex.grid/2, 0xd9b98a, 0xc6a071);
    grid.position.y=0.03;
    grid.material.transparent=true; grid.material.opacity=0;
    world.add(grid);
  }
  // piezas
  (d.pieces||[]).forEach(function(o){
    const def=DEFS[o.v]; if(!def || pieces.has(o.k)) return;
    let M=MATERIALS[0];
    for(const mm of MATERIALS) if(mm.id===o.mt) M=mm;
    spawnPiece(def, M, new THREE.Vector3(o.x,o.y,o.z), o.r, o.k, o.t, o.f);
    pieceCount++;
  });
  if(d.cx!=null){ charState.pos.set(d.cx, d.cy||0, d.cz); char.position.copy(charState.pos); }
  if(d.light!=null){ lightSliderEl.value=d.light; applyLight(d.light/100); }
  if(totalPlaced>=6){
    birdState.active=true; bird.visible=true;
    bird.position.set(10.6,2.45,7.2);
  }
  updateCovered(); updateCounter(); renderBuildUI(); renderMission();
  toast('📂 Partida cargada · <b>Nivel '+level+'</b> · ¡bienvenido de vuelta!');
}
setInterval(function(){ if(idbOK) saveNow(); }, 25000);
document.addEventListener('visibilitychange', function(){ if(document.hidden) saveNow(); });
addEventListener('beforeunload', saveNow);

document.getElementById('verTag').textContent=GAME_VERSION;
selectCategory(0); renderBuildUI(); updateCounter();
loadSave().then(function(d){
  if(d && d.tp>0){ restoreSave(d); }
  else {
    setTimeout(()=>toast('Construye, gana <b>XP</b> y sube de nivel para desbloquear el taller ✨'), 600);
    if(!idbOK) setTimeout(()=>toast('💾 Guardado no disponible en este entorno · funciona al alojar el juego'), 4200);
  }
});
renderer.setAnimationLoop(frame);
})();
</script>
